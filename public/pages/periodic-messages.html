<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="ws-port" content="34799">
    <title>周期消息 - FactorioWeb</title>
    <link rel="stylesheet" href="/css/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar"></aside>

        <div class="main-content">
            <nav class="top-nav">
                <div class="top-nav-title">周期消息</div>
                <div class="top-nav-actions">
                    <button class="btn btn-sm btn-outline-secondary theme-toggle-btn" id="theme-toggle" data-tooltip="切换深色/浅色模式" data-tooltip-position="bottom" onclick="toggleTheme()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg></button>
                    <button class="mobile-menu-toggle" id="mobile-menu-toggle">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                    <button class="btn btn-sm btn-danger" id="logout-btn" onclick="logout()">退出登录</button>
                </div>
            </nav>

            <div class="page-content">
                <div class="page-header">
                    <div class="page-header-left">
                        <h2><i class="bi bi-clock-history"></i>周期消息</h2>
                        <p>管理定时发送的周期性消息和物品发放</p>
                    </div>
                    <button class="btn btn-primary" onclick="openAddModal()">
                        <i class="bi bi-plus-lg me-1"></i>添加消息
                    </button>
                </div>

                <div class="table-container">
                    <div class="table-toolbar">
                        <div class="table-toolbar-title">
                            <i class="bi bi-list-ul"></i>消息列表
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th style="width: 40px;">#</th>
                                    <th>内容</th>
                                    <th>类型</th>
                                    <th>间隔</th>
                                    <th>目标</th>
                                    <th>状态</th>
                                    <th style="width: 100px;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="message-list-body">
                                <tr>
                                    <td colspan="7">
                                        <div class="empty-state">
                                            <i class="bi bi-inbox"></i>
                                            <p>暂无周期消息</p>
                                            <button class="btn btn-outline-primary btn-sm" onclick="openAddModal()">
                                                <i class="bi bi-plus-lg me-1"></i>添加第一条消息
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="messageModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="messageModalTitle">
                    <i class="bi bi-plus-circle"></i>添加周期消息
                </h3>
                <button type="button" class="modal-close" onclick="closeMessageModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-message-id" value="">
                <div class="mb-3">
                    <label class="form-label">消息类型<span class="text-danger">*</span></label>
                    <select class="form-control" id="msg-type" onchange="toggleItemType()">
                        <option value="message">消息</option>
                        <option value="item">物品</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">目标类型</label>
                    <select class="form-control" id="msg-target">
                        <option value="all">全部玩家</option>
                        <option value="online">仅在线玩家</option>
                    </select>
                </div>

                <div class="mb-3" id="msg-content-group">
                    <label class="form-label">消息内容<span class="text-danger">*</span></label>
                    <textarea class="form-control" id="msg-content" rows="3" placeholder="输入要定时发送的消息内容..."></textarea>
                </div>

                <div id="msg-item-group" style="display: none;">
                    <div class="mb-3">
                        <label class="form-label">物品代码<span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="msg-item-code" placeholder="如 iron-plate">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">物品数量<span class="text-danger">*</span></label>
                        <input type="number" class="form-control" id="msg-item-count" value="1" min="1">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">间隔类型</label>
                    <select class="form-control" id="msg-interval-type">
                        <option value="seconds">秒</option>
                        <option value="minutes">分钟</option>
                        <option value="hours">小时</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">间隔值<span class="text-danger">*</span></label>
                    <input type="number" class="form-control" id="msg-interval-value" value="30" min="1" placeholder="间隔数值">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeMessageModal()">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveMessage()">
                    <i class="bi bi-check-lg me-1"></i>保存
                </button>
            </div>
        </div>
    </div>

    <script src="/js/token-manager.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/shared.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/modal.js"></script>
    <script src="/js/sidebar-menu.js"></script>
    <script src="/js/tooltip.js"></script>
    <script>
        var messageList = [];

        document.addEventListener('DOMContentLoaded', function() {
            checkSession({
                requireAuth: true,
                onValid: function(userData) {
                    if (userData.role !== 'admin') {
                        showToast('权限不足，只有管理员才能访问此页面', 'error');
                        setTimeout(function() {
                            window.location.href = 'profile.html';
                        }, 1500);
                        return;
                    }
                    SidebarMenu.initSidebarWithPermission();
                    loadMessages();
                }
            });

            document.getElementById('messageModal').addEventListener('click', function(e) {
                if (e.target === this) closeMessageModal();
            });
        });

        function openMessageModal() {
            document.getElementById('messageModal').style.display = 'block';
        }

        function closeMessageModal() {
            document.getElementById('messageModal').style.display = 'none';
        }

        async function loadMessages() {
            try {
                var response = await fetchAPI('/api/chat/periodic-messages');
                var data = await response.json();
                messageList = data.data || [];
                renderMessageList();
            } catch (e) {
                console.error('加载周期消息失败', e);
                showToast('加载周期消息失败: ' + e.message, 'error');
            }
        }

        function isItemType(type) {
            return type === 'item' || type === 'give';
        }

        function renderMessageList() {
            var tbody = document.getElementById('message-list-body');
            tbody.innerHTML = '';

            if (messageList.length === 0) {
                tbody.innerHTML =
                    '<tr><td colspan="7">' +
                    '<div class="empty-state">' +
                    '<i class="bi bi-inbox"></i>' +
                    '<p>暂无周期消息</p>' +
                    '<button class="btn btn-outline-primary btn-sm" onclick="openAddModal()">' +
                    '<i class="bi bi-plus-lg me-1"></i>添加第一条消息</button>' +
                    '</div></td></tr>';
                return;
            }

            messageList.forEach(function(msg, index) {
                var isItem = isItemType(msg.type);
                var typeLabel = isItem ? '物品' : '消息';
                var typeClass = isItem ? 'item' : 'message';
                var targetLabel = msg.target === 'online' ? '仅在线' : '全部';
                var targetClass = msg.target === 'online' ? 'online' : 'all';
                var content = isItem
                    ? '<span class="msg-item-preview">' + escapeHtml(msg.item_code || '') + '</span> x' + (msg.item_count || 1)
                    : '<span class="msg-content-preview">' + escapeHtml(msg.content || '') + '</span>';
                var intervalLabel = formatInterval(msg.interval_type, msg.interval_value);
                var statusChecked = msg.enabled ? 'checked' : '';
                var statusText = msg.enabled ? '已启用' : '已禁用';

                var tr = document.createElement('tr');
                tr.innerHTML =
                    '<td style="color: var(--gray-color); font-size: 0.82rem;">' + (index + 1) + '</td>' +
                    '<td>' + content + '</td>' +
                    '<td><span class="badge-type ' + typeClass + '">' + typeLabel + '</span></td>' +
                    '<td><span class="interval-text">' + intervalLabel + '</span></td>' +
                    '<td><span class="badge-target ' + targetClass + '">' + targetLabel + '</span></td>' +
                    '<td>' +
                        '<label class="toggle-switch">' +
                            '<input type="checkbox" ' + statusChecked +
                            ' onchange="toggleMessage(' + msg.id + ', this.checked)">' +
                            '<span class="toggle-slider"></span>' +
                            '<span class="toggle-label">' + statusText + '</span>' +
                        '</label>' +
                    '</td>' +
                    '<td>' +
                        '<div style="display: flex; gap: 6px;">' +
                            '<button class="action-btn action-btn-edit" onclick="openEditModal(' + msg.id + ')" title="编辑">' +
                                '<i class="bi bi-pencil"></i>' +
                            '</button>' +
                            '<button class="action-btn action-btn-delete" onclick="openDeleteModal(' + msg.id + ')" title="删除">' +
                                '<i class="bi bi-trash"></i>' +
                            '</button>' +
                        '</div>' +
                    '</td>';
                tbody.appendChild(tr);
            });
        }

        function formatInterval(type, value) {
            var typeMap = { seconds: '秒', minutes: '分钟', hours: '小时' };
            return '每 ' + value + ' ' + (typeMap[type] || type);
        }

        function toggleItemType() {
            var type = document.getElementById('msg-type').value;
            if (type === 'item') {
                document.getElementById('msg-content-group').style.display = 'none';
                document.getElementById('msg-item-group').style.display = 'block';
            } else {
                document.getElementById('msg-content-group').style.display = 'block';
                document.getElementById('msg-item-group').style.display = 'none';
            }
        }

        function openAddModal() {
            document.getElementById('edit-message-id').value = '';
            document.getElementById('messageModalTitle').innerHTML = '<i class="bi bi-plus-circle"></i>添加周期消息';
            document.getElementById('msg-type').value = 'message';
            document.getElementById('msg-content').value = '';
            document.getElementById('msg-item-code').value = '';
            document.getElementById('msg-item-count').value = '1';
            document.getElementById('msg-interval-type').value = 'minutes';
            document.getElementById('msg-interval-value').value = '30';
            document.getElementById('msg-target').value = 'all';
            toggleItemType();
            openMessageModal();
        }

        function openEditModal(id) {
            var msg = messageList.find(function(m) { return m.id == id; });
            if (!msg) return;

            document.getElementById('edit-message-id').value = msg.id;
            document.getElementById('messageModalTitle').innerHTML = '<i class="bi bi-pencil"></i>编辑周期消息';
            document.getElementById('msg-type').value = isItemType(msg.type) ? 'item' : 'message';
            document.getElementById('msg-content').value = msg.content || '';
            document.getElementById('msg-item-code').value = msg.item_code || '';
            document.getElementById('msg-item-count').value = msg.item_count || 1;
            document.getElementById('msg-interval-type').value = msg.interval_type || 'minutes';
            document.getElementById('msg-interval-value').value = msg.interval_value || 30;
            document.getElementById('msg-target').value = msg.target || 'all';
            toggleItemType();

            openMessageModal();
        }

        async function saveMessage() {
            var type = document.getElementById('msg-type').value;
            var content = document.getElementById('msg-content').value.trim();
            var itemCode = document.getElementById('msg-item-code').value.trim();
            var itemCount = parseInt(document.getElementById('msg-item-count').value) || 1;
            var intervalType = document.getElementById('msg-interval-type').value;
            var intervalValue = parseInt(document.getElementById('msg-interval-value').value) || 30;
            var target = document.getElementById('msg-target').value;
            var editId = document.getElementById('edit-message-id').value;

            if (type === 'message' && !content) {
                showToast('请输入消息内容', 'error');
                return;
            }
            if (type === 'item' && !itemCode) {
                showToast('请输入物品代码', 'error');
                return;
            }

            var payload = {
                type: type === 'item' ? 'give' : 'chat',
                content: content,
                item_code: itemCode,
                item_count: itemCount,
                interval_type: intervalType,
                interval_value: intervalValue,
                target: target
            };

            try {
                var url = '/api/chat/periodic-messages';
                var method = 'POST';
                if (editId) {
                    url += '/' + editId;
                    method = 'PUT';
                }
                var response = await fetchAPI(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                var result = await response.json();
                if (result.success) {
                    closeMessageModal();
                    showToast(editId ? '消息已更新' : '消息已添加', 'success');
                    loadMessages();
                } else {
                    showToast('保存失败: ' + (result.error || result.message || '未知错误'), 'error');
                }
            } catch (e) {
                showToast('保存失败: ' + e.message, 'error');
            }
        }

        async function toggleMessage(id, enabled) {
            try {
                var response = await fetchAPI('/api/chat/periodic-messages/' + id + '/toggle', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ enabled: enabled ? 1 : 0 })
                });
                var result = await response.json();
                if (result.success) {
                    showToast(enabled ? '已启用' : '已禁用', 'success');
                    loadMessages();
                } else {
                    showToast('操作失败: ' + (result.error || result.message || '未知错误'), 'error');
                    loadMessages();
                }
            } catch (e) {
                showToast('操作失败: ' + e.message, 'error');
                loadMessages();
            }
        }

        function openDeleteModal(id) {
            showModal({
                title: '确认删除',
                content: '确定要删除这条周期消息吗？此操作不可恢复。',
                confirmText: '删除',
                danger: true,
                onConfirm: function() {
                    confirmDelete(id);
                }
            });
        }

        async function confirmDelete(id) {
            try {
                var response = await fetchAPI('/api/chat/periodic-messages/' + id, {
                    method: 'DELETE'
                });
                var result = await response.json();
                if (result.success) {
                    showToast('消息已删除', 'success');
                    loadMessages();
                } else {
                    showToast('删除失败: ' + (result.error || '未知错误'), 'error');
                }
            } catch (e) {
                showToast('删除失败: ' + e.message, 'error');
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日志查看器 - FactorioWeb</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/bootstrap-icons.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar"></aside>

        <div class="main-content">
            <div class="log-header">
                <div class="log-header-title">
                    <h2><i class="bi bi-journal-text"></i>日志查看器</h2>
                    <div class="log-header-subtitle">实时监控和查看 Factorio 服务器的所有日志</div>
                </div>
                <div class="log-header-actions">
                    <button class="btn btn-sm btn-outline-secondary theme-toggle-btn" id="theme-toggle" data-tooltip="切换深色/浅色模式" data-tooltip-position="bottom" onclick="toggleTheme()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg></button>
                    <button class="mobile-menu-toggle" id="mobile-menu-toggle">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                    <div class="ws-status" id="ws-status">
                        <span class="ws-dot disconnected" id="ws-dot"></span>
                        <span id="ws-text">WebSocket 未连接</span>
                    </div>

                    <button class="header-btn active" id="btn-autoscroll" onclick="toggleAutoScroll()" title="自动滚动">
                        <i class="bi bi-arrow-down-circle"></i>
                        <span>自动滚动</span>
                    </button>

                    <button class="header-btn" onclick="refreshLogs()" title="刷新日志">
                        <i class="bi bi-arrow-repeat"></i>
                    </button>

                    <div class="dropdown" id="export-dropdown">
                        <button class="header-btn btn-primary" onclick="toggleExportDropdown(event)" title="导出日志">
                            <i class="bi bi-download"></i>
                            <span>导出</span>
                        </button>
                        <ul class="dropdown-menu" id="export-dropdown-menu">
                            <li><a class="dropdown-item" href="#" onclick="exportLogs('txt'); return false;"><i class="bi bi-filetype-txt"></i>导出为 TXT</a></li>
                            <li><a class="dropdown-item" href="#" onclick="exportLogs('json'); return false;"><i class="bi bi-filetype-json"></i>导出为 JSON</a></li>
                        </ul>
                    </div>

                    <button class="header-btn btn-danger" onclick="showClearModal()" title="清除日志">
                        <i class="bi bi-trash"></i>
                        <span>清除</span>
                    </button>
                </div>
            </div>

            <div class="log-toolbar">
                <div class="category-tabs">
                    <button class="cat-tab active" data-type="all" onclick="switchCategory('all', this)">
                        <i class="bi bi-grid-3x3-gap"></i>全部日志
                    </button>
                    <button class="cat-tab" data-type="chat" onclick="switchCategory('chat', this)">
                        <i class="bi bi-chat-dots"></i>聊天记录
                    </button>
                    <button class="cat-tab" data-type="system" onclick="switchCategory('system', this)">
                        <i class="bi bi-gear"></i>系统日志
                    </button>
                    <button class="cat-tab" data-type="event" onclick="switchCategory('event', this)">
                        <i class="bi bi-bell"></i>事件日志
                    </button>
                    <button class="cat-tab" data-type="login" onclick="switchCategory('login', this)">
                        <i class="bi bi-box-arrow-in-right"></i>登录日志
                    </button>
                    <button class="cat-tab" data-type="logout" onclick="switchCategory('logout', this)">
                        <i class="bi bi-box-arrow-right"></i>登出日志
                    </button>
                    <button class="cat-tab" data-type="error" onclick="switchCategory('error', this)">
                        <i class="bi bi-exclamation-triangle"></i>错误日志
                    </button>
                </div>

                <div class="filter-row">
                    <div class="search-box">
                        <i class="bi bi-search"></i>
                        <input type="text" class="search-input" id="search-input" placeholder="搜索日志内容或关键词..." oninput="debounceSearch()">
                    </div>
                    <label class="regex-toggle">
                        <input type="checkbox" id="regex-mode"> 正则表达式
                    </label>
                    <label class="case-toggle">
                        <input type="checkbox" id="case-sensitive"> 区分大小写
                    </label>

                    <select class="filter-select" id="level-filter" onchange="applyFilters()">
                        <option value="">所有日志级别</option>
                        <option value="ERROR">ERROR 及以上</option>
                        <option value="WARN">WARN 及以上</option>
                        <option value="INFO">INFO 及以上</option>
                        <option value="DEBUG">DEBUG 及以上</option>
                    </select>

                    <div class="time-range-group">
                        <button class="time-btn" data-range="1h" onclick="setTimeRange('1h', this)">1小时</button>
                        <button class="time-btn" data-range="6h" onclick="setTimeRange('6h', this)">6小时</button>
                        <button class="time-btn active" data-range="24h" onclick="setTimeRange('24h', this)">24小时</button>
                        <button class="time-btn" data-range="7d" onclick="setTimeRange('7d', this)">7天</button>
                        <button class="time-btn" data-range="all" onclick="setTimeRange('all', this)">全部</button>
                    </div>
                </div>
            </div>

            <div class="log-terminal-wrapper">
                <div class="log-terminal" id="log-terminal">
                    <div class="log-content" id="log-content">
                        <div class="loading-state">
                            <div class="spinner-border" role="status"></div>
                            <p>正在加载日志，请稍候...</p>
                        </div>
                    </div>
                </div>

                <button class="scroll-to-latest" id="scroll-to-latest" onclick="scrollToBottom()" title="滚动到最新">
                    <i class="bi bi-arrow-down-circle"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="clear-modal-overlay" id="clear-modal-overlay" onclick="hideClearModal(event)">
        <div class="clear-modal" onclick="event.stopPropagation()">
            <div class="clear-modal-header">
                <h5><i class="bi bi-trash"></i>清除日志</h5>
                <button class="clear-modal-close" onclick="hideClearModal()"><i class="bi bi-x"></i></button>
            </div>
            <div class="clear-modal-body">
                <div class="clear-section">
                    <h6>清除方式</h6>
                    <div class="clear-option selected" onclick="selectClearOption(this, 'time')">
                        <input type="radio" name="clear-type" value="time" checked>
                        <label>按时间清除：删除 N 天前的所有日志</label>
                    </div>
                    <div class="clear-input-row" id="time-clear-options">
                        <input type="number" id="clear-days" value="30" min="1" max="365" onchange="updateClearPreview()" oninput="syncInput(this)">
                        <span style="color: var(--gray-color); font-size: 0.85rem;">天</span>
                        <input type="range" id="clear-days-slider" value="30" min="1" max="365" oninput="syncSlider(this)">
                    </div>

                    <div class="clear-option" style="margin-top: 10px;" onclick="selectClearOption(this, 'count')">
                        <input type="radio" name="clear-type" value="count">
                        <label>按数量保留：只保留最新的 N 条日志</label>
                    </div>
                    <div class="clear-input-row" id="count-clear-options" style="display: none;">
                        <input type="number" id="clear-count" value="10000" min="100" max="1000000" step="100" onchange="updateClearPreview()">
                        <span style="color: var(--gray-color); font-size: 0.85rem;">条</span>
                    </div>
                </div>

                <div class="clear-section">
                    <h6>选择要清除的日志类别</h6>
                    <div class="clear-categories">
                        <label class="cat-checkbox"><input type="checkbox" value="chat" checked> 聊天记录</label>
                        <label class="cat-checkbox"><input type="checkbox" value="system" checked> 系统日志</label>
                        <label class="cat-checkbox"><input type="checkbox" value="event" checked> 事件日志</label>
                        <label class="cat-checkbox"><input type="checkbox" value="login" checked> 登录日志</label>
                        <label class="cat-checkbox"><input type="checkbox" value="logout" checked> 登出日志</label>
                        <label class="cat-checkbox"><input type="checkbox" value="error" checked> 错误日志</label>
                        <label class="cat-checkbox"><input type="checkbox" value="save" checked> 存档日志</label>
                    </div>
                </div>

                <div class="clear-preview">
                    预计将清除 <strong id="clear-estimate">0</strong> 条日志
                </div>
            </div>
            <div class="clear-modal-footer">
                <button class="header-btn" onclick="hideClearModal()">取消</button>
                <button class="header-btn btn-danger" onclick="confirmClearLogs()">
                    <i class="bi bi-trash"></i>确认清除
                </button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="/js/token-manager.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/shared.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/modal.js"></script>
    <script src="/js/sidebar-menu.js"></script>
    <script src="/js/tooltip.js"></script>
    <script src="/js/websocket.js"></script>
    <script src="/js/app.js"></script>

    <script>
        // ========== 常量配置 ==========
        const MAX_DOM_NODES = 500;          // DOM 中最大保留节点数
        const MAX_MEMORY_LOGS = 5000;       // 内存中最大保留日志条数
        const PAGE_SIZE = 200;              // 每页拉取条数（降低单次压力）
        const SCROLL_LOAD_THRESHOLD = 200;  // 滚动到底部多少像素时触发加载下一页
        const SCROLL_DEBOUNCE_MS = 100;     // 滚动事件防抖间隔
        const REGEX_TIMEOUT_MS = 1000;      // 正则匹配超时保护（用于提示）
        const REGEX_MAX_LENGTH = 200;       // 正则表达式最大长度限制

        // ========== 全局状态 ==========
        let currentLogs = [];               // 内存中的日志数据（有上限）
        let filteredLogs = [];              // 过滤后的日志
        let currentCategory = 'all';
        let currentTimeRange = '24h';
        let autoScrollEnabled = true;
        let userScrolledUp = false;
        let searchTimer = null;

        // 分页状态
        let pagination = {
            currentPage: 1,
            totalPages: 1,
            total: 0,
            isLoading: false,
            hasMore: true,
            lastLogTime: null               // 最后一条日志的时间戳，用于去重衔接
        };

        // WebSocket 连接状态
        let wsConnected = false;
        let wsBuffer = [];                  // WS 缓冲区：loadLogs 期间暂存实时日志

        // 滚动防抖
        let scrollDebounceTimer = null;
        let isProgrammaticScroll = false;
        let _refreshing = false;

        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', function() {
            checkSession({
                requireAuth: true,
                onValid: function(userData) {
                    if (userData.role !== 'admin') {
                        showToast('权限不足，只有管理员才能访问此页面', 'error');
                        setTimeout(function() {
                            window.location.href = 'profile.html';
                        }, 1500);
                        return;
                    }
                    SidebarMenu.initSidebarWithPermission();
                    setupScrollDetection();
                    // 关键修复：先加载历史日志，完成后再连接 WebSocket
                    loadLogs().then(function() {
                        connectWebSocket();
                    });
                }
            });
        });

        // ========== 日志加载（单页 + 懒加载） ==========
        async function loadLogs() {
            var logContent = document.getElementById('log-content');
            logContent.innerHTML = '<div class="loading-state"><div class="spinner-border" role="status"></div><p>正在加载日志，请稍候...</p></div>';

            // 重置分页状态
            pagination.currentPage = 1;
            pagination.hasMore = true;
            pagination.isLoading = false;
            pagination.lastLogTime = null;
            currentLogs = [];
            filteredLogs = [];
            wsBuffer = [];

            try {
                var params = buildQueryParams();
                params.set('page_size', String(PAGE_SIZE));

                var response = await fetchAPI('/api/logs?' + params.toString());
                var data = await response.json();

                if (data.success && data.data) {
                    var logs = data.data.logs || [];
                    var total = data.data.total || 0;
                    var pageSize = data.data.page_size || PAGE_SIZE;

                    currentLogs = logs;
                    pagination.total = total;
                    pagination.totalPages = Math.ceil(total / pageSize);
                    pagination.currentPage = data.data.page || 1;
                    pagination.hasMore = pagination.currentPage < pagination.totalPages;

                    // 记录最后一条日志的时间，用于与 WS 数据去重衔接
                    if (currentLogs.length > 0) {
                        pagination.lastLogTime = currentLogs[currentLogs.length - 1].time || null;
                    }

                    // 合并 WS 缓冲区中在历史数据之后的新日志
                    flushWsBuffer();

                    applyFilters();
                    showToast('已加载 ' + currentLogs.length + ' 条日志' + (pagination.hasMore ? '（滚动到底部加载更多）' : ''), 'success');
                } else {
                    logContent.innerHTML = '<div class="empty-state"><i class="bi bi-inbox"></i><p>暂无日志数据</p></div>';
                    currentLogs = [];
                    filteredLogs = [];
                }
            } catch (err) {
                console.error('加载日志失败', err);
                logContent.innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-circle"></i><p style="color:#e74c3c;">加载日志失败: ' + escapeHtml(err.message) + '</p></div>';
                showToast('加载日志失败: ' + err.message, 'error');
            }
        }

        // 构建查询参数
        function buildQueryParams() {
            var params = new URLSearchParams();

            if (currentCategory !== 'all') {
                params.set('type', currentCategory);
            }

            var levelFilter = document.getElementById('level-filter').value;
            if (levelFilter) {
                params.set('level', levelFilter);
            }

            if (currentTimeRange !== 'all') {
                var now = new Date();
                params.set('end_date', now.toISOString());
                var rangeMap = { '1h': 3600000, '6h': 21600000, '24h': 86400000, '7d': 604800000 };
                params.set('start_date', new Date(now.getTime() - rangeMap[currentTimeRange]).toISOString());
            }

            return params;
        }

        // 滚动到底部时懒加载下一页
        async function loadNextPage() {
            if (pagination.isLoading || !pagination.hasMore) return;

            pagination.isLoading = true;

            try {
                var params = buildQueryParams();
                params.set('page_size', String(PAGE_SIZE));
                params.set('page', String(pagination.currentPage + 1));

                var response = await fetchAPI('/api/logs?' + params.toString());
                var data = await response.json();

                if (data.success && data.data) {
                    var logs = data.data.logs || [];

                    // 去重：基于时间戳+消息内容，防止分页偏移导致的数据重叠
                    var existingKeys = new Set(currentLogs.map(function(e) {
                        return (e.time || '') + '|' + (e.message || '');
                    }));

                    var newLogs = logs.filter(function(e) {
                        return !existingKeys.has((e.time || '') + '|' + (e.message || ''));
                    });

                    currentLogs = currentLogs.concat(newLogs);
                    pagination.currentPage = data.data.page || pagination.currentPage + 1;
                    pagination.hasMore = pagination.currentPage < pagination.totalPages;

                    // 更新最后日志时间
                    if (currentLogs.length > 0) {
                        pagination.lastLogTime = currentLogs[currentLogs.length - 1].time || null;
                    }

                    // 合并 WS 缓冲区
                    flushWsBuffer();

                    // 裁切内存
                    trimMemoryLogs();

                    applyFilters();
                }
            } catch (err) {
                console.error('加载下一页失败', err);
                showToast('加载更多日志失败', 'error');
            } finally {
                pagination.isLoading = false;
            }
        }

        // 刷新日志（重置加载）
        function refreshLogs() {
            if (_refreshing) return;
            _refreshing = true;
            loadLogs().finally(function() {
                setTimeout(function() { _refreshing = false; }, 3000);
            });
        }

        // ========== WebSocket 连接 ==========
        function connectWebSocket() {
            wsClient.on('open', function() {
                wsConnected = true;
                updateWsStatus('connected', '已连接');
                showToast('实时日志连接成功', 'success');
            });

            wsClient.subscribe('log', function(entry) {
                if (entry) {
                    appendLogEntry(entry);
                }
            });

            wsClient.on('close', function() {
                wsConnected = false;
                updateWsStatus('disconnected', '连接已断开');
            });

            wsClient.on('error', function(error) {
                wsConnected = false;
                updateWsStatus('disconnected', '连接错误');
            });

            updateWsStatus('reconnecting', '正在重连...');
            wsClient.connect();
        }

        function updateWsStatus(state, text) {
            var dot = document.getElementById('ws-dot');
            var txt = document.getElementById('ws-text');
            if (dot && txt) {
                dot.className = 'ws-dot ' + state;
                txt.textContent = text;
            }
        }

        // ========== WS 缓冲区：解决历史加载与实时推送的时序冲突 ==========
        function flushWsBuffer() {
            if (wsBuffer.length === 0) return;

            // 只追加时间在 lastLogTime 之后的日志，避免重复
            var added = 0;
            wsBuffer.forEach(function(entry) {
                if (!pagination.lastLogTime || entry.time > pagination.lastLogTime) {
                    currentLogs.push(entry);
                    added++;
                }
            });

            wsBuffer = [];

            if (added > 0) {
                trimMemoryLogs();
            }
        }

        // ========== 实时日志追加 ==========
        function appendLogEntry(entry) {
            if (!entry) return;

            entry.type = entry.type || entry.category || 'system';
            entry.time = entry.time || entry.timestamp || new Date().toLocaleString('zh-CN');
            entry.level = entry.level || 'INFO';
            entry.message = entry.message || entry.msg || entry.content || '';

            // 如果历史数据还在加载中，暂存到缓冲区
            if (pagination.isLoading) {
                wsBuffer.push(entry);
                return;
            }

            // 去重检查：与最后一条日志比较
            if (currentLogs.length > 0) {
                var last = currentLogs[currentLogs.length - 1];
                if (last.time === entry.time && last.message === entry.message) {
                    return; // 重复，跳过
                }
            }

            currentLogs.push(entry);

            // 更新分页锚点时间
            pagination.lastLogTime = entry.time;

            // 裁切内存
            trimMemoryLogs();

            // 如果当前过滤条件下该条目可见，追加到 DOM
            if (shouldShowEntry(entry)) {
                var logContent = document.getElementById('log-content');
                var el = createLogElement(entry, true);
                logContent.appendChild(el);

                // DOM 裁切：移除超出的旧节点
                trimDomNodes();

                if (autoScrollEnabled && !userScrolledUp) {
                    scrollToBottomImmediate();
                }
            }
        }

        function shouldShowEntry(entry) {
            if (currentCategory !== 'all' && entry.type !== currentCategory) return false;
            var levelOrder = { DEBUG: 0, INFO: 1, WARN: 2, ERROR: 3 };
            var minLevel = document.getElementById('level-filter').value;
            if (minLevel && (levelOrder[entry.level] || 0) < (levelOrder[minLevel] || 0)) return false;
            return true;
        }

        // ========== DOM 与内存裁切保护 ==========
        function trimDomNodes() {
            var logContent = document.getElementById('log-content');
            while (logContent.childElementCount > MAX_DOM_NODES) {
                logContent.removeChild(logContent.firstChild);
            }
        }

        function trimMemoryLogs() {
            if (currentLogs.length > MAX_MEMORY_LOGS) {
                currentLogs = currentLogs.slice(currentLogs.length - MAX_MEMORY_LOGS);
            }
        }

        // ========== 日志元素创建 ==========
        function createLogElement(entry, isNew) {
            var div = document.createElement('div');
            div.className = 'log-entry ' + (entry.type || 'info') + (isNew ? ' new-entry' : '');
            div.dataset.type = entry.type || 'info';

            var message = escapeHtml(entry.message || '');

            var searchVal = document.getElementById('search-input').value.trim();
            if (searchVal) {
                message = highlightText(message, searchVal);
            }

            var playerTag = '';
            if (entry.playerName && (entry.type === 'login' || entry.type === 'logout')) {
                playerTag = '<span class="log-player">' + escapeHtml(entry.playerName) + '</span>';
            }

            div.innerHTML =
                '<span class="log-time">' + escapeHtml(entry.time || '') + '</span>' +
                '<span class="log-level ' + (entry.level || 'INFO') + '">' + (entry.level || 'INFO') + '</span>' +
                playerTag +
                '<span class="log-msg">' + message + '</span>';

            return div;
        }

        // ========== 渲染日志列表（带 DOM 裁切） ==========
        function renderLogList() {
            var logContent = document.getElementById('log-content');

            if (filteredLogs.length === 0) {
                logContent.innerHTML = '<div class="empty-state"><i class="bi bi-inbox"></i><p>暂无符合条件的日志</p></div>';
                return;
            }

            logContent.innerHTML = '';

            // 只渲染最新的 MAX_DOM_NODES 条，避免 DOM 爆炸
            var startIdx = Math.max(0, filteredLogs.length - MAX_DOM_NODES);
            for (var i = startIdx; i < filteredLogs.length; i++) {
                logContent.appendChild(createLogElement(filteredLogs[i], false));
            }

            // 如果有更多数据未显示，在顶部添加提示
            if (startIdx > 0) {
                var hint = document.createElement('div');
                hint.className = 'log-entry load-more-hint';
                hint.innerHTML = '<span class="log-msg" style="color: var(--gray-color); font-style: italic;">... 前方还有 ' + startIdx + ' 条日志，请缩小搜索范围查看 ...</span>';
                logContent.insertBefore(hint, logContent.firstChild);
            }

            if (autoScrollEnabled && !userScrolledUp) {
                scrollToBottomImmediate();
            }
        }

        // ========== 分类与时间范围切换 ==========
        function switchCategory(type, btn) {
            currentCategory = type;
            document.querySelectorAll('.cat-tab').forEach(function(t) { t.classList.remove('active'); });
            btn.classList.add('active');
            loadLogs();
        }

        function setTimeRange(range, btn) {
            currentTimeRange = range;
            document.querySelectorAll('.time-btn').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            loadLogs();
        }

        // ========== 过滤逻辑（含正则安全保护） ==========
        function applyFilters() {
            var result = currentLogs.slice();

            if (currentCategory !== 'all') {
                result = result.filter(function(e) { return e.type === currentCategory; });
            }

            var levelVal = document.getElementById('level-filter').value;
            if (levelVal) {
                var order = { DEBUG: 0, INFO: 1, WARN: 2, ERROR: 3 };
                var minLv = order[levelVal] || 0;
                result = result.filter(function(e) { return (order[e.level] || 0) >= minLv; });
            }

            var searchVal = document.getElementById('search-input').value.trim();
            if (searchVal) {
                var isRegex = document.getElementById('regex-mode').checked;
                var isCaseSensitive = document.getElementById('case-sensitive').checked;

                // 正则安全保护
                if (isRegex) {
                    if (searchVal.length > REGEX_MAX_LENGTH) {
                        showToast('正则表达式过长（最大 ' + REGEX_MAX_LENGTH + ' 字符）', 'warning');
                        filteredLogs = [];
                        renderLogList();
                        return;
                    }
                    var testRegex = safeRegex(searchVal, isCaseSensitive);
                    if (!testRegex) {
                        showToast('正则表达式语法错误，请检查输入', 'warning');
                        filteredLogs = [];
                        renderLogList();
                        return;
                    }
                }

                result = result.filter(function(e) {
                    var text = (e.message || '') + ' ' + (e.time || '');
                    var target = isCaseSensitive ? text : text.toLowerCase();
                    var query = isCaseSensitive ? searchVal : searchVal.toLowerCase();

                    if (isRegex) {
                        var regex = safeRegex(searchVal, isCaseSensitive);
                        if (!regex) return false;
                        return regex.test(text);
                    }
                    return target.includes(query);
                });
            }

            filteredLogs = result;
            renderLogList();
        }

        // 安全的正则表达式创建（防 ReDoS）
        function safeRegex(pattern, isCaseSensitive) {
            try {
                var flags = isCaseSensitive ? 'g' : 'gi';
                // 检测潜在的危险模式：重复量词嵌套
                if (/(\+|\*){2,}|(\+\+|\*\*)/.test(pattern)) {
                    return null;
                }
                var regex = new RegExp(pattern, flags);
                // 简单的长度合理性检查
                if (pattern.length > REGEX_MAX_LENGTH) {
                    return null;
                }
                return regex;
            } catch (e) {
                return null;
            }
        }

        function debounceSearch() {
            if (searchTimer) clearTimeout(searchTimer);
            searchTimer = setTimeout(applyFilters, 300);
        }

        function highlightText(text, keyword) {
            var isRegex = document.getElementById('regex-mode').checked;
            var isCaseSensitive = document.getElementById('case-sensitive').checked;

            try {
                var flags = 'g';
                if (!isCaseSensitive) flags += 'i';
                var regex;
                if (isRegex) {
                    regex = safeRegex(keyword, isCaseSensitive);
                    if (!regex) return text;
                } else {
                    regex = new RegExp(keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), flags);
                }
                return text.replace(regex, '<mark>$&</mark>');
            } catch (e) {
                return text;
            }
        }

        // ========== 自动滚动 ==========
        function toggleAutoScroll() {
            autoScrollEnabled = !autoScrollEnabled;
            var btn = document.getElementById('btn-autoscroll');
            if (autoScrollEnabled) {
                btn.classList.add('active');
                btn.innerHTML = '<i class="bi bi-arrow-down-circle"></i><span>自动滚动</span>';
                userScrolledUp = false;
                scrollToBottomImmediate();
            } else {
                btn.classList.remove('active');
                btn.innerHTML = '<i class="bi bi-pause-circle"></i><span>暂停滚动</span>';
            }
        }

        function setupScrollDetection() {
            var terminal = document.getElementById('log-terminal');
            var scrollBtn = document.getElementById('scroll-to-latest');

            terminal.addEventListener('scroll', function() {
                // 如果是程序触发的滚动，忽略
                if (isProgrammaticScroll) return;

                // 防抖处理
                if (scrollDebounceTimer) clearTimeout(scrollDebounceTimer);
                scrollDebounceTimer = setTimeout(function() {
                    var threshold = 150;
                    var atBottom = terminal.scrollHeight - terminal.scrollTop - terminal.clientHeight < threshold;

                    if (!atBottom) {
                        userScrolledUp = true;
                        scrollBtn.classList.add('show');
                    } else {
                        userScrolledUp = false;
                        scrollBtn.classList.remove('show');
                    }

                    // 滚动到底部附近时，懒加载下一页
                    if (atBottom && pagination.hasMore && !pagination.isLoading) {
                        loadNextPage();
                    }
                }, SCROLL_DEBOUNCE_MS);
            });
        }

        function scrollToBottom() {
            var terminal = document.getElementById('log-terminal');
            isProgrammaticScroll = true;
            terminal.scrollTo({ top: terminal.scrollHeight, behavior: 'smooth' });
            setTimeout(function() { isProgrammaticScroll = false; }, 300);
        }

        function scrollToBottomImmediate() {
            var terminal = document.getElementById('log-terminal');
            isProgrammaticScroll = true;
            terminal.scrollTop = terminal.scrollHeight;
            // 立即重置标记
            isProgrammaticScroll = false;
        }

        // ========== 清除日志弹窗 ==========
        function showClearModal() {
            document.getElementById('clear-modal-overlay').classList.add('show');
            updateClearPreview();
        }

        function hideClearModal(event) {
            if (event && event.target !== event.currentTarget) return;
            document.getElementById('clear-modal-overlay').classList.remove('show');
        }

        function selectClearOption(el, type) {
            document.querySelectorAll('.clear-option').forEach(function(o) { o.classList.remove('selected'); });
            el.classList.add('selected');
            document.querySelector('input[name="clear-type"][value="' + type + '"]').checked = true;

            document.getElementById('time-clear-options').style.display = type === 'time' ? 'flex' : 'none';
            document.getElementById('count-clear-options').style.display = type === 'count' ? 'flex' : 'none';
            updateClearPreview();
        }

        function syncSlider(slider) {
            document.getElementById('clear-days').value = slider.value;
            updateClearPreview();
        }

        function syncInput(input) {
            document.getElementById('clear-days-slider').value = input.value;
            updateClearPreview();
        }

        function updateClearPreview() {
            var type = document.querySelector('input[name="clear-type"]:checked').value;
            var estimate = 0;

            if (type === 'time') {
                var days = parseInt(document.getElementById('clear-days').value) || 30;
                var cutoff = Date.now() - days * 86400000;
                estimate = currentLogs.filter(function(e) {
                    var t = new Date(e.time || 0).getTime();
                    return t > 0 && t < cutoff;
                }).length;
            } else {
                var count = parseInt(document.getElementById('clear-count').value) || 10000;
                estimate = Math.max(0, currentLogs.length - count);
            }

            document.getElementById('clear-estimate').textContent = estimate.toLocaleString();
        }

        async function confirmClearLogs() {
            var type = document.querySelector('input[name="clear-type"]:checked').value;
            var categories = [];
            document.querySelectorAll('.clear-categories input:checked').forEach(function(cb) {
                categories.push(cb.value);
            });

            if (categories.length === 0) {
                showToast('请至少选择一个日志类别', 'warning');
                return;
            }

            var value = type === 'time'
                ? (parseInt(document.getElementById('clear-days').value) || 30)
                : (parseInt(document.getElementById('clear-count').value) || 10000);

            showModal({title:'确认清除日志',content:'确定要清除 '+document.getElementById('clear-estimate').textContent+' 条日志吗？此操作不可撤销！',confirmText:'清除',danger:true,onConfirm:function(){
                return (async function(){
                    try {
                        var response = await fetchAPI('/api/logs/clear', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                type: type,
                                value: value,
                                categories: categories
                            })
                        });

                        var data = await response.json();

                        if (data.success) {
                            showToast('日志清除成功', 'success');
                            hideClearModal();
                            loadLogs();
                        } else {
                            showToast(data.error || '清除日志失败', 'error');
                        }
                    } catch (err) {
                        showToast('清除日志出错: ' + err.message, 'error');
                    }
                })();
            }});
        }

        // ========== 导出日志 ==========
        async function exportLogs(format) {
            showToast('正在准备导出数据...', 'info');
            try {
                var params = buildQueryParams();
                params.set('page_size', '100000');
                var response = await fetchAPI('/api/logs?' + params.toString());
                var data = await response.json();

                var logsToExport = [];
                if (data.success && data.data && data.data.logs) {
                    logsToExport = data.data.logs;
                } else {
                    logsToExport = filteredLogs.length > 0 ? filteredLogs : currentLogs;
                }

                if (logsToExport.length === 0) {
                    showToast('没有可导出的日志', 'warning');
                    return;
                }

                var content, filename, mimeType;

                if (format === 'txt') {
                    content = logsToExport.map(function(log) {
                        return '[' + (log.time || '') + '] [' + (log.level || 'INFO') + '] ' + (log.message || '');
                    }).join('\n');
                    filename = 'factorio-logs-' + new Date().toISOString().slice(0, 19).replace(/:/g, '-') + '.txt';
                    mimeType = 'text/plain';
                } else if (format === 'json') {
                    content = JSON.stringify(logsToExport, null, 2);
                    filename = 'factorio-logs-' + new Date().toISOString().slice(0, 19).replace(/:/g, '-') + '.json';
                    mimeType = 'application/json';
                }

                downloadFile(content, filename, mimeType);
                showToast('日志已导出 (' + format.toUpperCase() + ')，共 ' + logsToExport.length + ' 条', 'success');
            } catch (err) {
                showToast('导出失败: ' + err.message, 'error');
            }
        }

        function toggleExportDropdown(event) {
            event.stopPropagation();
            var menu = document.getElementById('export-dropdown-menu');
            menu.classList.toggle('show');
        }

        document.addEventListener('click', function() {
            var menu = document.getElementById('export-dropdown-menu');
            if (menu) {
                menu.classList.remove('show');
            }
        });

        function downloadFile(content, filename, mimeType) {
            var blob = new Blob([content], { type: mimeType });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>

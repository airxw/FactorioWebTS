<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FactorioWeb - 控制台</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/bootstrap-icons.css">
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-lg, 20px);
        }
        .dashboard-grid .card-full {
            grid-column: 1 / -1;
        }
        @media (max-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        .status-row {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .status-row .status-indicator {
            font-size: 15px;
            padding: 10px 20px;
        }
        .status-row .status-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            color: var(--color-text-secondary, #666);
            font-size: 0.9rem;
        }
        .status-row .status-meta span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .status-pending {
            background-color: rgba(243, 156, 18, 0.12);
            color: #856404;
            border: 1px solid rgba(243, 156, 18, 0.25);
        }
        .status-pending::before {
            background-color: var(--warning-color, #f39c12);
            animation: pulse 1.5s infinite;
        }

        .version-summary {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--spacing-md, 12px);
            flex-wrap: wrap;
        }
        .version-summary-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .version-summary-left .ver-label {
            font-size: 0.85rem;
            color: var(--color-text-secondary, #666);
        }
        .version-summary-left .ver-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-color, #3498db);
        }
        .version-summary-left .ver-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .ver-badge.badge-success { background: rgba(39,174,96,0.15); color: #27ae60; }
        .ver-badge.badge-warning { background: rgba(243,156,18,0.15); color: #d35400; }
        .ver-badge.badge-danger  { background: rgba(231,76,60,0.15);  color: #e74c3c; }

        .update-section {
            padding: var(--spacing-md, 12px) var(--spacing-lg, 20px);
            background: linear-gradient(135deg, rgba(52,152,219,0.04) 0%, rgba(46,204,113,0.03) 100%);
            border-radius: 10px;
            border: 1px solid var(--color-border, #e0e0e0);
            margin-top: var(--spacing-md, 12px);
            text-align: center;
        }
        .update-section:empty { display: none; }
        .update-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 500;
            margin-bottom: var(--spacing-sm, 8px);
        }
        .update-badge.badge-warning {
            background: rgba(243,156,18,0.12);
            color: #d35400;
            border: 1px solid rgba(243,156,18,0.25);
        }
        .update-badge.badge-success {
            background: rgba(39,174,96,0.12);
            color: #27ae60;
            border: 1px solid rgba(39,174,96,0.25);
        }
        .update-badge.badge-danger {
            background: rgba(231,76,60,0.12);
            color: #e74c3c;
            border: 1px solid rgba(231,76,60,0.25);
        }
        .update-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .update-btn {
            min-width: 180px;
            justify-content: center;
            padding: 10px 20px;
            font-size: 0.9rem;
        }
        .update-btn i { font-size: 1rem; }
        @media (max-width: 600px) {
            .update-btn { min-width: 100%; }
        }

        .version-empty-hint {
            text-align: center;
            padding: var(--spacing-xl, 32px) var(--spacing-lg, 20px);
            color: var(--color-text-secondary, #999);
        }
        .version-empty-hint i {
            font-size: 2rem;
            display: block;
            margin-bottom: 8px;
            color: var(--color-text-secondary, #bbb);
        }

        .install-progress {
            margin-top: var(--spacing-md, 12px);
            padding: var(--spacing-md, 12px) var(--spacing-lg, 20px);
            background: rgba(52,152,219,0.06);
            border-radius: 10px;
            border: 1px solid rgba(52,152,219,0.2);
        }
        .install-progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .install-progress-status {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary-color, #3498db);
        }
        .install-progress-percent {
            font-size: 0.85rem;
            color: var(--color-text-secondary, #666);
        }
        .install-progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(0,0,0,0.08);
            border-radius: 4px;
            overflow: hidden;
        }
        .install-progress-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, #3498db, #2ecc71);
            transition: width 0.5s ease;
        }
        .install-progress-fill.failed {
            background: #e74c3c;
        }
        .install-progress-fill.done {
            background: #2ecc71;
        }
    </style>
</head>
<body class="dashboard-page" x-data="createPageApp(dashboardApp())" x-init="init()" @refresh-requested.window="refreshAll()">
    <div class="app-container">
        <aside class="sidebar" id="sidebar"></aside>

        <div class="main-content">
            <nav class="top-nav">
                <div class="top-nav-title">控制台</div>
                <div class="top-nav-actions">
                    <button class="mobile-menu-toggle" id="mobile-menu-toggle">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                    <button class="btn btn-sm btn-outline-secondary theme-toggle-btn" @click="ThemeManager.toggle()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    </button>
                    <button class="btn btn-sm btn-secondary" @click="refreshAll()">刷新状态</button>
                    <button class="btn btn-sm btn-danger" @click="logout()">退出登录</button>
                </div>
            </nav>

            <div class="page-content">
                <div class="dashboard-grid">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h2 class="card-title"><i class="bi bi-hdd-rack"></i> 服务端状态</h2>
                            <a href="server-control.html" class="btn btn-sm btn-primary" x-show="isAdmin">
                                <i class="bi bi-gear"></i> 服务器控制
                            </a>
                        </div>
                        <div class="card-body">
                            <div class="status-row">
                                <div class="status-indicator" :class="statusClass" x-text="serverStatus"></div>
                                <div class="status-meta">
                                    <span><i class="bi bi-tag"></i> <span x-text="serverVersion || '未知'"></span></span>
                                    <span x-show="serverState === 'running'"><i class="bi bi-people"></i> <span x-text="playerCount + ' 在线'"></span></span>
                                    <span x-show="serverState === 'running'"><i class="bi bi-clock"></i> <span x-text="uptimeText"></span></span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h3 class="card-title"><i class="bi bi-box-seam"></i> 当前版本</h3>
                            <button class="btn btn-sm btn-outline-secondary" @click="checkVersion()">
                                <i class="bi bi-arrow-clockwise"></i> 检查更新
                            </button>
                        </div>
                        <div class="card-body">
                            <div class="version-summary">
                                <div class="version-summary-left">
                                    <span class="ver-label">版本</span>
                                    <span class="ver-value" x-text="currentVersion"></span>
                                    <span class="ver-badge" x-text="versionStatusText" :class="versionStatusClass"></span>
                                </div>
                            </div>
                            <div class="update-section" x-html="versionInfo"></div>
                            <div class="install-progress" x-show="installingVersion">
                                <div class="install-progress-header">
                                    <span class="install-progress-status" x-text="installStatusText"></span>
                                    <span class="install-progress-percent" x-text="installProgress + '%'"></span>
                                </div>
                                <div class="install-progress-bar">
                                    <div class="install-progress-fill" :class="{ 'failed': installFailed, 'done': installProgress >= 100 }" :style="'width: ' + installProgress + '%'"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card card-full">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h3 class="card-title"><i class="bi bi-layers"></i> 已安装版本</h3>
                            <button class="btn btn-sm btn-outline-secondary" @click="loadVersionList()">
                                <i class="bi bi-arrow-clockwise"></i> 刷新
                            </button>
                        </div>
                        <div class="card-body">
                            <div x-show="!versionsLoaded" class="version-empty-hint">
                                <i class="bi bi-hourglass-split"></i>
                                <p>加载中...</p>
                            </div>
                            <div x-show="versionsLoaded && versions.length === 0" class="version-empty-hint">
                                <i class="bi bi-box-seam"></i>
                                <p>暂无安装的版本</p>
                                <p><small>请前往<a href="server-control.html">服务器控制</a>页面安装版本</small></p>
                            </div>
                            <div x-show="versionsLoaded && versions.length > 0" class="table-responsive">
                                <table class="table">
                                    <thead><tr><th>版本号</th><th>类型</th><th>安装日期</th><th>状态</th><th x-show="isAdmin">操作</th></tr></thead>
                                    <tbody>
                                        <template x-for="v in versions" :key="v.version">
                                            <tr>
                                                <td><span class="version-tag" :class="{ 'version-current': v.is_current }" x-text="v.version"></span></td>
                                                <td x-text="v.release_type"></td>
                                                <td x-text="formatTs(v.installed_at)"></td>
                                                <td>
                                                    <span class="badge" :class="v.is_current ? 'badge-success' : 'badge-secondary'" x-text="v.is_current ? '当前' : '已安装'"></span>
                                                </td>
                                                <td x-show="isAdmin">
                                                    <div class="table-actions">
                                                        <button class="btn btn-sm btn-primary" @click="setDefault(v.version)" x-show="!v.is_current && v.is_installed">
                                                            <i class="bi bi-check"></i> 设为默认
                                                        </button>
                                                        <button class="btn btn-sm btn-warning" @click="verifyVer(v.version)">
                                                            <i class="bi bi-shield-check"></i> 验证
                                                        </button>
                                                        <button class="btn btn-sm btn-danger" @click="deleteVer(v.version)" x-show="!v.is_current">
                                                            <i class="bi bi-trash"></i> 删除
                                                        </button>
                                                    </div>
                                                </td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="/js/token-manager.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/shared.js"></script>
    <script src="/js/modal.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/sidebar-menu.js"></script>
    <script src="/js/websocket.js"></script>
    <script src="/js/common.js"></script>
    <script>
    function dashboardApp() {
      return {
        serverState: 'unknown',
        serverStatus: '加载中...',
        serverVersion: '',
        isRunning: false,
        isAdmin: false,
        currentVersion: '未知',
        versionStatusText: '未知',
        versionStatusClass: '',
        versionInfo: '',
        versions: [],
        versionsLoaded: false,
        latestVersion: null,
        statusClass: 'status-loading',
        stateReceived: false,
        playerCount: 0,
        uptimeText: '',
        installingVersion: '',
        installProgress: 0,
        installStatusText: '',
        installFailed: false,
        _installPollTimer: null,
        _refreshing: false,
        installLoading: false,

        init() {
          window.__dashboardInstance = this;
          SidebarMenu.initSidebarWithPermission();
          this.checkAuth();
          this.connectWebSocket();
        },

        connectWebSocket() {
          if (typeof wsClient !== 'undefined') {
            wsClient.on('server_state', (data) => {
              this.onServerState(data);
            });
            if (!wsClient.connected) {
              wsClient.connect();
            }
          }
        },

        onServerState(data) {
          if (!data || !data.state) return;
          this.stateReceived = true;
          this.serverState = data.state;
          if (data.version) this.serverVersion = data.version;
          this.updateStatus();
        },

        updateStatus() {
          this.isRunning = this.serverState === 'running';
          this.serverStatus = this.serverStateText();
          this.statusClass = this.statusClassFor();
          try {
            localStorage.setItem('server_running', (this.serverState === 'running' || this.serverState === 'starting') ? 'true' : 'false');
          } catch(e) {}
          if (typeof SidebarMenu !== 'undefined' && SidebarMenu.refresh) {
            SidebarMenu.refresh();
          }
        },

        serverStateText() {
          var map = {
            unknown: '加载中...', off: '已停止', starting: '启动中...', running: '运行中', stopping: '停止中...', error: '异常'
          };
          return map[this.serverState] || '未知';
        },

        statusClassFor() {
          if (this.serverState === 'unknown') return 'status-loading';
          if (this.serverState === 'running') return 'status-online';
          if (this.serverState === 'starting' || this.serverState === 'stopping') return 'status-pending';
          return 'status-offline';
        },

        formatUptime(seconds) {
          if (!seconds || seconds <= 0) return '';
          var d = Math.floor(seconds / 86400);
          var h = Math.floor((seconds % 86400) / 3600);
          var m = Math.floor((seconds % 3600) / 60);
          var parts = [];
          if (d > 0) parts.push(d + '天');
          if (h > 0) parts.push(h + '时');
          if (m > 0) parts.push(m + '分');
          if (parts.length === 0) parts.push(Math.floor(seconds) + '秒');
          return parts.join(' ');
        },

        checkAuth() {
          var token = TokenManager.getToken();
          if (!token) { window.location.href = 'login.html'; return; }

          var userInfo = TokenManager.getUserInfo();
          if (userInfo) {
            this.isAdmin = userInfo.role === 'admin';
          }

          fetchAPI('/api/auth/validate')
            .then(r => r.json())
            .then(d => {
              if (d.success && d.data) {
                this.isAdmin = d.data.role === 'admin';
                TokenManager.setUserInfo(d.data);
                this.refreshAll();
              } else {
                TokenManager.clear();
                window.location.href = 'login.html';
              }
            })
            .catch(function(err) {
              console.error('验证失败:', err);
              TokenManager.clear();
              window.location.href = 'login.html';
            });
        },

        refreshAll() {
          if (this._refreshing) return;
          this._refreshing = true;
          this.loadServerStatus();
          this.loadCurrentVersion();
          this.loadVersionList();
          var self = this;
          setTimeout(function() { self._refreshing = false; }, 3000);
        },

        async loadServerStatus() {
          try {
            var res = await fetchAPI('/api/server/status');
            var data = await res.json();
            if (data.success && data.data) {
              this.serverState = data.data.state || 'unknown';
              this.stateReceived = true;
              this.serverVersion = data.data.version || '';
              this.playerCount = data.data.playerCount || 0;
              this.uptimeText = this.formatUptime(data.data.uptime);
              this.updateStatus();
            }
          } catch(e) { this.showToast('获取服务器状态失败', 'error'); }
        },

        async loadCurrentVersion() {
          try {
            var res = await fetchAPI('/api/versions/current');
            var data = await res.json();
            if (data.success && data.data) {
              var v = data.data;
              if (v.version && v.version !== '') {
                this.currentVersion = v.version;
                this.versionStatusText = '已安装';
                this.versionStatusClass = 'badge-success';
              } else {
                this.currentVersion = '未安装';
                this.versionStatusText = '未安装';
                this.versionStatusClass = 'badge-warning';
              }
            } else {
              this.currentVersion = '未知';
              this.versionStatusText = '获取失败';
              this.versionStatusClass = 'badge-danger';
            }
          } catch(e) {
            this.currentVersion = '未知';
            this.versionStatusText = '获取失败';
            this.versionStatusClass = 'badge-danger';
          }
        },

        async loadVersionList() {
          this.versionsLoaded = false;
          try {
            var res = await fetchAPI('/api/versions');
            var data = await res.json();
            if (data.success) {
              this.versions = Array.isArray(data.data) ? data.data : [];
            } else {
              this.versions = [];
            }
          } catch(e) {
            this.versions = [];
          } finally {
            this.versionsLoaded = true;
          }
        },

        async checkVersion() {
          try {
            var res = await fetchAPI('/api/versions/latest-all');
            var data = await res.json();
            if (data.success && data.data) {
              this.latestVersion = data.data;

              var hasInstalled = this.currentVersion && this.currentVersion !== '未安装' && this.currentVersion !== '未知';
              var hasAnyUpdate = data.data.stable.has_update || data.data.experimental.has_update;
              var html = '';

              if (!hasInstalled) {
                html += '<div class="update-badge badge-warning"><i class="bi bi-download"></i> 可安装版本</div>';
              } else if (hasAnyUpdate) {
                html += '<div class="update-badge badge-warning"><i class="bi bi-exclamation-triangle-fill"></i> 有可用更新</div>';
              } else {
                html += '<div class="update-badge badge-success"><i class="bi bi-check-circle-fill"></i> 已是最新版本</div>';
              }

              html += '<div class="update-buttons">';

              var stableAvailable = data.data.stable.version && data.data.stable.version !== '';
              if (stableAvailable) {
                var stableNeedInstall = !hasInstalled || data.data.stable.has_update;
                var stableBtnClass = stableNeedInstall ? 'btn-primary' : 'btn-success';
                var stableText = stableNeedInstall ? '安装正式版 ' + data.data.stable.version : '正式版 ' + data.data.stable.version + '（已安装）';
                var stableDisabled = stableNeedInstall ? '' : 'disabled';

                html += '<button class="btn ' + stableBtnClass + ' update-btn" onclick="window.__dashboardInstance.installVersionByType(\'stable\')" ' + stableDisabled + '>'
                  + '<i class="bi bi-check-circle-fill"></i> ' + stableText
                  + '</button>';
              }

              var experimentalAvailable = data.data.experimental.version && data.data.experimental.version !== '';
              if (experimentalAvailable) {
                var expNeedInstall = !hasInstalled || data.data.experimental.has_update;
                var expBtnClass = expNeedInstall ? 'btn-warning' : 'btn-info';
                var expText = expNeedInstall ? '安装测试版 ' + data.data.experimental.version : '测试版 ' + data.data.experimental.version + '（已安装）';
                var expDisabled = expNeedInstall ? '' : 'disabled';

                html += '<button class="btn ' + expBtnClass + ' update-btn" onclick="if(window.__dashboardInstance.installLoading) return; window.__dashboardInstance.installVersionByType(\'experimental\')" ' + expDisabled + '>'
                  + '<i class="bi bi-flask"></i> ' + expText
                  + '</button>';
              }

              html += '</div>';

              this.versionInfo = html;
            }
          } catch (e) {
            this.versionInfo = '<div class="update-badge badge-danger"><i class="bi bi-x-circle-fill"></i> 检查更新失败</div>';
          }
        },

        async installVersionByType(releaseType) {
          if (this.installLoading) return;
          var version = releaseType === 'experimental'
            ? (this.latestVersion && this.latestVersion.experimental ? this.latestVersion.experimental.version : null)
            : (this.latestVersion && this.latestVersion.stable ? this.latestVersion.stable.version : null);

          if (!version) {
            this.showToast('获取版本信息失败', 'error');
            return;
          }

          var typeName = releaseType === 'experimental' ? '测试版' : '正式版';
          var confirmed = await window.showConfirm({ content: '确定要安装' + typeName + ' ' + version + ' 吗？' });
          if (!confirmed) return;

          this.installLoading = true;
          try {
            var res = await fetchAPI('/api/versions/upgrade', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ target_version: version, release_type: releaseType })
            });
            var data = await res.json();
            if (data.success) {
              this.installingVersion = version;
              this.installProgress = 0;
              this.installStatusText = '准备中...';
              this.installFailed = false;
              this.startPollProgress(version);
              this.showToast('版本安装已启动', 'info');
            } else {
              this.showToast(data.error || '安装失败', 'error');
            }
          } catch(e) { this.showToast('网络错误', 'error'); }
          finally { this.installLoading = false; }
        },

        startPollProgress(version) {
          if (this._installPollTimer) clearInterval(this._installPollTimer);
          this.pollInstallProgress(version);
          this._installPollTimer = setInterval(() => {
            this.pollInstallProgress(version);
          }, 2000);
        },

        pollInstallProgress(version) {
          fetchAPI('/api/versions/progress?version=' + encodeURIComponent(version))
            .then(r => r.json())
            .then(d => {
              if (d.success && d.data) {
                this.installProgress = d.data.progress || 0;
                this.installStatusText = d.data.status || '';
                if (d.data.progress >= 100) {
                  this.stopPollProgress();
                  this.installingVersion = '';
                  this.showToast('版本安装完成', 'success');
                  setTimeout(() => { this.loadVersionList(); this.loadCurrentVersion(); }, 1500);
                  return;
                }
                if (d.data.status && d.data.status.indexOf('失败') >= 0) {
                  this.installFailed = true;
                  this.stopPollProgress();
                  this.installingVersion = '';
                  return;
                }
              }
            })
            .catch(function() {});
        },

        stopPollProgress() {
          if (this._installPollTimer) {
            clearInterval(this._installPollTimer);
            this._installPollTimer = null;
          }
        },

        async setDefault(version) {
          var confirmed = await window.showConfirm({ content: '确定要将 ' + version + ' 设为默认版本吗？' });
          if (!confirmed) return;
          try {
            var res = await fetchAPI('/api/versions/set-default', {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ version: version })
            });
            var data = await res.json();
            this.showToast(data.success ? '默认版本已设置' : (data.error || '设置失败'), data.success ? 'success' : 'error');
            if (data.success) this.loadVersionList();
          } catch(e) { this.showToast('网络错误', 'error'); }
        },

        async deleteVer(version) {
          var confirmed = await window.showConfirm({ title: '删除版本', content: '确定要删除版本 ' + version + ' 吗？此操作不可逆！', danger: true });
          if (!confirmed) return;
          try {
            var res = await fetchAPI('/api/versions/' + encodeURIComponent(version), { method: 'DELETE' });
            var data = await res.json();
            this.showToast(data.success ? '版本已删除' : (data.error || '删除失败'), data.success ? 'success' : 'error');
            if (data.success) this.loadVersionList();
          } catch(e) { this.showToast('网络错误', 'error'); }
        },

        async verifyVer(version) {
          try {
            var res = await fetchAPI('/api/versions/verify/' + encodeURIComponent(version));
            var data = await res.json();
            var valid = data.success && data.data && data.data.valid;
            this.showToast(valid ? '版本验证成功' : (data.data && data.data.message ? data.data.message : '验证失败'), valid ? 'success' : 'error');
          } catch(e) { this.showToast('网络错误', 'error'); }
        },

        formatTs(ts) {
          if (!ts) return '-';
          return new Date(ts * 1000).toLocaleString('zh-CN');
        },

      };
    }
    </script>
    <script src="/js/alpine.min.js"></script>
</body>
</html>

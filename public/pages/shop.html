<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FactorioWeb - 商城</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/bootstrap-icons.css">
    <script src="/js/htmx.min.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/alpine.min.js" defer></script>
</head>
<body x-data="createPageApp(shopApp())" x-init="init()">
    <div class="app-container">
        <aside class="sidebar" id="sidebar"></aside>

        <div class="main-content">
            <nav class="top-nav">
                <div class="top-nav-title">商城</div>
                <div class="top-nav-actions">
                    <button class="btn btn-sm btn-outline-secondary theme-toggle-btn" @click="ThemeManager.toggle()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    </button>
                    <button class="mobile-menu-toggle" id="mobile-menu-toggle">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </button>
                    <button class="btn btn-sm btn-secondary" @click="loadItems()">刷新商品</button>
                    <button class="btn btn-sm btn-info" @click="openRequestModal()">请求物品</button>
                    <button class="btn btn-sm btn-danger" @click="logout()">退出登录</button>
                </div>
            </nav>

            <div class="page-content">
                <div class="shop-layout">
                    <div class="shop-products">
                        <div class="card">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h3 class="card-title">商品列表</h3>
                                <div class="shop-header-controls">
                                    <input type="text" x-model="itemSearch" @input="itemPage=1" class="form-control" placeholder="搜索商品..." style="max-width:160px;">
                                    <!-- [价格显示开关] 暂时隐藏，恢复时移除 x-show="false" 即可 -->
                                    <label class="shop-price-toggle" title="显示/隐藏价格" x-show="false">
                                        <input type="checkbox" x-model="showPrice" @change="savePricePref()">
                                        <span>显示价格</span>
                                    </label>
                                    <select x-model="selectedQuality" class="form-control" style="max-width:120px;">
                                        <option :value="1">普通</option>
                                        <option :value="2">稀有</option>
                                        <option :value="3">史诗</option>
                                        <option :value="4">传说</option>
                                        <option :value="5">神话</option>
                                    </select>
                                    <select x-model="selectedCategory" @change="itemPage=1" class="form-control" style="max-width:160px;">
                                        <option value="">全部分类</option>
                                        <template x-for="c in categories" :key="c"><option :value="c" x-text="catLabel(c)"></option></template>
                                    </select>
                                    <select x-model.number="itemPageSize" @change="itemPage=1" class="form-control" style="max-width:100px;">
                                        <option :value="12">12条/页</option>
                                        <option :value="24">24条/页</option>
                                        <option :value="36">36条/页</option>
                                    </select>
                                </div>
                            </div>
                            <div class="card-body">
                                <div class="item-grid">
                                    <div x-show="paginatedItems.length === 0" class="loading">暂无商品</div>
                                    <template x-for="item in paginatedItems" :key="item.id">
                                        <div class="shop-item" :class="{ 'item-disabled': !item.enabled }">
                                            <div class="shop-item-row">
                                                <div class="shop-item-name" x-text="item.name_cn || item.code"></div>
                                                <div class="shop-item-category"><span class="badge bg-secondary" x-text="catLabel(item.category)"></span></div>
                                            </div>
                                            <div class="shop-item-row">
                                                <div class="shop-item-code"><code x-text="item.code"></code></div>
                                                <div class="shop-item-price" x-text="item.price > 0 ? '¥' + item.price : '免费'" x-show="showPrice"></div>
                                            </div>
                                            <button class="btn btn-primary shop-item-btn" @click="addToCart(item, selectedQuality)" :disabled="!item.enabled">加入购物车</button>
                                        </div>
                                    </template>
                                </div>
                                <template x-if="displayItems.length > itemPageSize">
                                <div style="display:flex;justify-content:space-between;align-items:center;padding-top:16px;margin-top:16px;border-top:1px solid var(--border-color);">
                                    <span style="font-size:13px;color:var(--color-text-secondary);">共 <span x-text="displayItems.length"></span> 个商品，第 <span x-text="itemPage"></span>/<span x-text="totalPages"></span> 页</span>
                                    <div style="display:flex;gap:4px;">
                                        <button class="btn btn-sm btn-secondary" :disabled="itemPage <= 1" @click="itemPage--;">上一页</button>
                                        <button class="btn btn-sm btn-secondary" :disabled="itemPage >= totalPages" @click="itemPage++;">下一页</button>
                                    </div>
                                </div>
                                </template>
                            </div>
                        </div>
                    </div>

                    <div class="cart-panel">
                        <div class="card mb-4">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h3 class="card-title" style="margin:0;">购物车</h3>
                                <button class="btn btn-sm btn-danger" @click="cart = []; syncCart()" x-show="cart.length > 0">清空</button>
                            </div>
                            <div class="card-body">
                                <div x-show="cart.length === 0" class="cart-empty">
                                    <div style="font-size:32px;margin-bottom:8px;">🛒</div>
                                    <div>购物车是空的</div>
                                </div>
                                <template x-for="(ci,idx) in cart" :key="idx">
                                    <div class="cart-item">
                                        <div>
                                            <strong x-text="ci.item.name_cn || ci.item.code"></strong>
                                            <div class="text-muted" style="font-size:12px;" x-text="'x' + ci.quantity + (ci.quality > 0 ? ' | 品质Lv.' + ci.quality : '')"></div>
                                        </div>
                                        <div class="cart-quantity-controls">
                                            <button class="btn btn-sm btn-secondary" @click="ci.quantity > 1 ? ci.quantity-- : cart.splice(idx,1); syncCart()">-</button>
                                            <span x-text="ci.quantity"></span>
                                            <button class="btn btn-sm btn-secondary" @click="ci.quantity++; syncCart()">+</button>
                                        </div>
                                    </div>
                                </template>
                            </div>
                            <div class="card-footer" x-show="cart.length > 0">
                                <button class="btn btn-primary w-100" @click="openCheckout()">去结账</button>
                            </div>
                        </div>

                        <div class="card">
                            <div class="card-header"><h3 class="card-title" style="margin:0;">VIP信息</h3></div>
                            <div class="card-body" id="vip-info-container">
                                <div x-show="vipLevels.length > 0">
                                    <template x-for="vl in vipLevels" :key="vl.id">
                                        <div class="shop-item-row">
                                            <strong style="color:var(--primary-color);" x-text="vl.name"></strong>
                                            <div class="shop-item-detail" x-text="'每日限购: ' + (vl.daily_purchase_limit === -1 ? '无限' : vl.daily_purchase_limit) + ' | 单次限购: ' + (vl.single_purchase_limit === -1 ? '无限' : vl.single_purchase_limit)"></div>
                                        </div>
                                    </template>
                                </div>
                                <div x-show="vipLevels.length === 0" class="loading">暂无VIP等级</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card mt-4">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h3 class="card-title">我的订单</h3>
                        <div style="display:flex;align-items:center;gap:8px;flex-wrap:nowrap;">
                            <button class="btn btn-sm btn-danger" @click="deleteSelectedOrders()" x-show="selectedOrderIds.length > 0">删除选中 (<span x-text="selectedOrderIds.length"></span>)</button>
                            <input type="text" x-model="orderSearch" @keydown.enter="orderPage=1;loadOrders()" class="form-control" placeholder="搜索订单号/商品/玩家" style="max-width:180px;display:inline-block;">
                            <button class="btn btn-sm btn-secondary" @click="orderPage=1;loadOrders()">搜索</button>
                            <select x-model="orderStatusFilter" @change="orderPage=1;loadOrders()" class="form-control" style="max-width:120px;display:inline-block;">
                                <option value="">全部状态</option>
                                <option value="pending">待处理</option>
                                <option value="processing">处理中</option>
                                <option value="delivered">已发货</option>
                                <option value="cancelled">已取消</option>
                                <option value="failed">失败</option>
                            </select>
                            <button class="btn btn-sm btn-secondary" @click="orderPage=1;loadOrders()">刷新</button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table">
                                <thead><tr><th style="width:36px;"><input type="checkbox" @change="toggleSelectAllOrders()" :checked="allOrdersSelected"></th><th>订单号</th><th>商品</th><th>数量</th><th>品质</th><th>提货码</th><th>总价</th><th>状态</th><th>时间</th><th>操作</th></tr></thead>
                                <tbody>
                                    <tr x-show="orders.length === 0"><td colspan="10" class="text-center">暂无订单</td></tr>
                                    <template x-for="o in orders" :key="o.order_id || o.order_number">
                                        <tr>
                                            <td><input type="checkbox" @change="toggleOrderSelect(o.order_id)" :checked="selectedOrderIds.indexOf(o.order_id) > -1"></td>
                                            <td><code x-text="o.order_number || '-'"></code></td>
                                            <td x-text="o.item_name + (o.is_batch ? ' (' + o.quantity + '件)' : '')"></td>
                                            <td x-text="o.is_batch ? '-' : o.quantity"></td>
                                            <td x-text="o.is_batch ? '-' : (o.quality_level ?? '-')"></td>
                                            <td><template x-if="o.cdk_code"><code style="font-size:1.05em;letter-spacing:1px;color:var(--color-success,#28a745)" x-text="o.cdk_code"></code></template><template x-if="!o.cdk_code"><span style="color:var(--color-text-secondary)">-</span></template></td>
                                            <td x-text="'¥' + (o.total_price || 0)"></td>
                                            <td><span class="badge" :class="orderStatusClass(o.status)" x-text="orderStatusText(o.status)"></span></td>
                                            <td x-text="formatTs(o.created_at)"></td>
                                            <td>
                                                <button class="btn btn-sm btn-danger" @click="deleteOrder(o.order_id)">删除</button>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                        <template x-if="orderTotal > 0">
                        <div style="display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px solid var(--border-color);">
                            <span style="font-size:13px;color:var(--color-text-secondary);">共 <span x-text="orderTotal"></span> 条，第 <span x-text="orderPage"></span>/<span x-text="Math.ceil(orderTotal / orderPageSize)"></span> 页</span>
                            <div style="display:flex;gap:4px;">
                                <button class="btn btn-sm btn-secondary" :disabled="orderPage <= 1" @click="orderPage--;loadOrders()">上一页</button>
                                <button class="btn btn-sm btn-secondary" :disabled="orderPage >= Math.ceil(orderTotal / orderPageSize)" @click="orderPage++;loadOrders()">下一页</button>
                            </div>
                        </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <template x-if="showCheckout">
    <div class="modal-overlay" style="display:flex;" @click.self="showCheckout = false">
        <div class="modal-dialog">
            <div class="modal-header"><h3>确认订单</h3><button class="modal-close" @click="showCheckout = false">&times;</button></div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">发货方式</label>
                    <div style="display:flex;gap:12px;flex-direction:column;">
                        <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;padding:10px 12px;border:1px solid var(--color-border);border-radius:8px;" :style="deliveryMethod === 'cdk' ? 'border-color:var(--primary-color);background:var(--color-primary-bg,rgba(0,123,255,0.05))' : ''">
                            <input type="radio" x-model="deliveryMethod" value="cdk" style="margin-top:2px;">
                            <div>
                                <div style="font-weight:600;">提货码领取</div>
                                <div style="font-size:var(--font-size-sm);color:var(--color-text-secondary);margin-top:2px;">下单后获得提货码，在游戏内输入 !claim &lt;提货码&gt; 领取</div>
                            </div>
                        </label>
                        <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;padding:10px 12px;border:1px solid var(--color-border);border-radius:8px;" :style="deliveryMethod === 'direct' ? 'border-color:var(--primary-color);background:var(--color-primary-bg,rgba(0,123,255,0.05))' : ''" :class="!boundGameId ? 'opacity-50' : ''">
                            <input type="radio" x-model="deliveryMethod" value="direct" style="margin-top:2px;" :disabled="!boundGameId">
                            <div>
                                <div style="font-weight:600;">直接发送 <span x-show="!boundGameId" style="font-size:var(--font-size-xs);color:var(--color-text-secondary);font-weight:400;">（需先绑定游戏角色）</span></div>
                                <div style="font-size:var(--font-size-sm);color:var(--color-text-secondary);margin-top:2px;">
                                    <span x-show="boundGameId">物品将直接发送到绑定的角色：<strong x-text="boundGameId"></strong></span>
                                    <span x-show="!boundGameId">请先在<a href="profile.html" style="color:var(--primary-color);">个人中心</a>绑定游戏角色</span>
                                </div>
                            </div>
                        </label>
                    </div>
                </div>
                <div class="checkout-summary" style="margin-top:var(--spacing-md);">
                    <div class="price-summary-row">总价 <span class="price-total" x-text="'¥' + cartTotal"></span></div>
                    <div class="price-summary-row">商品数 <span x-text="cart.length"></span></div>
                </div>
                <div x-show="checkoutError" class="text-danger" style="margin-bottom:var(--spacing-md);font-size:var(--font-size-sm);" x-text="checkoutError"></div>
                <div x-show="directResult" class="cdk-result-box" style="background:var(--color-success-bg);border:2px solid var(--color-success-border);border-radius:8px;padding:var(--spacing-md);margin-bottom:var(--spacing-md);text-align:center">
                    <div style="font-weight:700;margin-bottom:4px">物品已直接发送！</div>
                    <div style="font-size:var(--font-size-sm);color:var(--color-text-secondary);margin-top:4px">物品已发送到角色 <strong x-text="boundGameId"></strong>，请在游戏中查收</div>
                </div>
                <div x-show="cdkCombined" class="cdk-result-box" style="background:var(--color-success-bg);border:2px solid var(--color-success-border);border-radius:8px;padding:var(--spacing-md);margin-bottom:var(--spacing-md);text-align:center">
                    <div style="font-weight:700;margin-bottom:4px">提货码已生成！</div>
                    <div style="font-size:1.5rem;font-family:var(--font-mono,monospace);letter-spacing:3px;color:var(--primary-color)" x-text="cdkCombined"></div>
                    <div style="font-size:var(--font-size-sm);color:var(--color-text-secondary);margin-top:8px">在游戏聊天中输入 <code style="background:var(--color-surface);color:var(--primary-color);padding:2px 6px;border-radius:3px;border:1px solid var(--color-border)">!claim <span x-text="cdkCombined"></span></code> 即可提货</div>
                </div>
                <template x-if="!showCopyBtn && !directResult">
                <button class="btn btn-primary w-100" @click="submitCheckout()" :disabled="submitting">
                    <span x-show="!submitting">确认购买</span>
                    <span x-show="submitting">提交中...</span>
                </button>
                </template>
                <template x-if="showCopyBtn">
                <div style="display:flex;gap:8px;">
                    <button class="btn btn-primary" style="flex:1;" @click="copyCdkCode()">复制提货码</button>
                    <button class="btn btn-secondary" @click="showCheckout = false">关闭</button>
                </div>
                </template>
                <template x-if="directResult">
                <button class="btn btn-secondary w-100" @click="showCheckout = false">关闭</button>
                </template>
            </div>
        </div>
    </div>
    </template>

    <template x-if="showRequestModal">
    <div class="modal-overlay" style="display:flex;" @click.self="showRequestModal = false">
        <div class="modal-dialog">
            <div class="modal-header"><h3>请求物品</h3><button class="modal-close" @click="showRequestModal = false">&times;</button></div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">选择物品</label>
                    <select class="form-control" x-model="requestItemId">
                        <option value="">-- 请选择物品 --</option>
                        <template x-for="item in displayItems" :key="item.id">
                            <option :value="item.id" x-text="(item.name_cn || item.code) + ' (' + item.code + ')'"></option>
                        </template>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">游戏角色名</label>
                    <input type="text" class="form-control" x-model="requestPlayerName" placeholder="请输入你的游戏角色名" required>
                </div>
                <div class="form-row" style="display:flex;gap:var(--spacing-md);">
                    <div class="form-group" style="flex:1;">
                        <label class="form-label">数量</label>
                        <input type="number" class="form-control" x-model="requestQuantity" min="1" max="999">
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label class="form-label">品质等级</label>
                        <select class="form-control" x-model.number="requestQuality">
                            <option value="1">普通</option>
                            <option value="2">稀有</option>
                            <option value="3">史诗</option>
                            <option value="4">传说</option>
                            <option value="5">神话</option>
                        </select>
                    </div>
                </div>
                <div x-show="requestError" class="text-danger" style="margin-bottom:var(--spacing-md);font-size:var(--font-size-sm);" x-text="requestError"></div>
                <button class="btn btn-primary w-100" @click="submitItemRequest()" :disabled="requestSubmitting">
                    <span x-show="!requestSubmitting">提交请求</span>
                    <span x-show="requestSubmitting">提交中...</span>
                </button>
            </div>
        </div>
    </div>
    </template>

    <div id="toast-container" class="toast-container"></div>

    <script src="/js/token-manager.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/shared.js"></script>
    <script src="/js/modal.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/sidebar-menu.js"></script>
    <script>
    function shopApp() {
      return {
        items: [],
        categories: [],
        selectedCategory: '',
        selectedQuality: 1,
        showPrice: localStorage.getItem('shop_show_price') === 'true',
        cart: [],
        orders: [],
        orderStatusFilter: '',
        orderSearch: '',
        orderPage: 1,
        orderPageSize: 10,
        orderTotal: 0,
        selectedOrderIds: [],
        vipLevels: [],
        showCheckout: false,
        deliveryMethod: 'cdk',
        boundGameId: '',
        checkoutError: '',
        cdkCombined: '',
        directResult: false,
        submitting: false,
        showCopyBtn: false,
        syncing: false,
        showRequestModal: false,
        requestItemId: '',
        requestQuantity: 1,
        requestQuality: 1,
        requestPlayerName: '',
        requestError: '',
        requestSubmitting: false,
        selectedQualities: {},
        itemPage: 1,
        itemPageSize: 12,
        itemSearch: '',

        syncCartAbortController: null,

        async syncCart() {
          if (this.syncCartAbortController) {
            this.syncCartAbortController.abort();
          }
          this.syncCartAbortController = new AbortController();
          this.syncing = true;
          try {
            var body = JSON.stringify({
              items: this.cart.map(function(ci) {
                return { item_id: ci.item.id, quantity: Number(ci.quantity), quality_level: Number(ci.quality) || 1 };
              })
            });
            await fetchAPI('/api/cart', {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: body,
              signal: this.syncCartAbortController.signal
            });
          } catch(e) {
            if (e.name !== 'AbortError') {
              this.showToast('同步购物车失败', 'error');
            }
          }
          finally { this.syncing = false; }
        },

        async fetchCart() {
          try {
            var res = await fetchAPI('/api/cart');
            var data = await res.json();
            if (data.success && Array.isArray(data.data)) {
              this.cart = data.data.map(function(item) {
                return {
                  item: {
                    id: item.item_id,
                    name_cn: item.name_cn || item.name,
                    code: item.code,
                    price: item.price,
                    category: item.category,
                    enabled: true
                  },
                  quantity: item.quantity,
                  quality: item.quality_level
                };
              });
            }
          } catch(e) { this.showToast('获取购物车失败', 'error'); }
        },

        init() {
          SidebarMenu.initSidebarWithPermission();
          var token = TokenManager.getToken();
          if (!token) { window.location.href = 'login.html'; return; }
          this.fetchCart();
          this.loadItems();
          this.loadOrders();
          this.loadVipLevels();
          this.loadBoundGameId();
        },

        get displayItems() {
          var items = this.items.filter(function(i) { return i.enabled; });
          if (this.selectedCategory) items = items.filter(function(i) { return i.category === this.selectedCategory; }.bind(this));
          if (this.itemSearch) {
            var s = this.itemSearch.toLowerCase();
            items = items.filter(function(i) {
              return (i.code && i.code.toLowerCase().indexOf(s) !== -1) ||
                     (i.name_cn && i.name_cn.toLowerCase().indexOf(s) !== -1) ||
                     (i.name && i.name.toLowerCase().indexOf(s) !== -1);
            });
          }
          return items;
        },

        get totalPages() {
          return Math.ceil(this.displayItems.length / this.itemPageSize) || 1;
        },

        get paginatedItems() {
          var start = (this.itemPage - 1) * this.itemPageSize;
          return this.displayItems.slice(start, start + this.itemPageSize);
        },

        get cartTotal() {
          return this.cart.reduce(function(sum, ci) { return sum + (ci.item.price || 0) * ci.quantity; }, 0);
        },

        async loadItems() {
          try {
            var res = await fetchAPI('/api/shop/items');
            if (!res.ok) throw new Error('Items API error: ' + res.status);
            var data = await res.json();
            if (!data.success) throw new Error('Items API failed: ' + data.error);
            this.items = data.data || [];
            this.itemPage = 1;
            var cats = {};
            this.items.forEach(function(i) { if (i.category) cats[i.category] = true; });
            this.categories = Object.keys(cats);
            console.log('Shop loaded', this.items.length, 'items');
          } catch(e) {
            console.error('Failed to load shop items:', e);
            this.showToast('加载商品数据失败: ' + e.message, 'error');
          }
        },

        async loadOrders() {
          try {
            var params = [];
            if (this.orderStatusFilter) params.push('status=' + this.orderStatusFilter);
            if (this.orderSearch) params.push('search=' + encodeURIComponent(this.orderSearch));
            params.push('page=' + this.orderPage);
            params.push('pageSize=' + this.orderPageSize);
            var url = '/api/shop/orders/my?' + params.join('&');
            var res = await fetchAPI(url);
            var data = await res.json();
            this.orders = (data.success && data.data) ? data.data : [];
            this.selectedOrderIds = [];
            this.orderTotal = data.total || 0;
            this.orderPage = data.page || 1;
          } catch(e) { this.showToast('加载订单失败', 'error'); }
        },

        async loadVipLevels() {
          try {
            var res = await fetchAPI('/api/vip/levels');
            var data = await res.json();
            this.vipLevels = (data.success && data.data) ? data.data : [];
          } catch(e) { this.showToast('加载VIP等级失败', 'error'); }
        },

        async addToCart(item, quality) {
          var q = quality != null ? Number(quality) : (item.quality_level || 0);
          var existing = this.cart.find(function(ci) { return ci.item.id === item.id && ci.quality === q; });
          if (existing) { existing.quantity++; }
          else { this.cart.push({ item: item, quantity: 1, quality: q }); }
          await this.syncCart();
          this.showToast('已加入购物车', 'success');
        },

        openCheckout() {
          if (this.cart.length === 0) { this.showToast('购物车为空', 'warning'); return; }
          this.showCheckout = true;
          this.checkoutError = '';
          this.cdkCombined = '';
          this.directResult = false;
          this.showCopyBtn = false;
          if (!this.boundGameId) { this.deliveryMethod = 'cdk'; }
        },

        async loadBoundGameId() {
          try {
            var res = await fetchAPI('/api/auth/me');
            var data = await res.json();
            if (data.success && data.data && data.data.game_id) {
              this.boundGameId = data.data.game_id;
            }
          } catch(e) { console.error('Failed to load user info:', e); }
        },

        async submitCheckout() {
          if (this.deliveryMethod === 'direct' && !this.boundGameId) {
            this.checkoutError = '请先在个人中心绑定游戏角色';
            return;
          }
          this.submitting = true;
          this.checkoutError = '';
          this.cdkCombined = '';
          this.directResult = false;
          this.showCopyBtn = false;

          try {
            if (this.cart.length === 1) {
              var ci = this.cart[0];
              var res = await fetchAPI('/api/shop/orders', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  item_id: ci.item.id,
                  quantity: Number(ci.quantity),
                  quality_level: Number(ci.quality),
                  delivery_method: this.deliveryMethod
                })
              });
              var data = await res.json();
              if (data.success) {
                if (data.data.delivery_method === 'direct') {
                  this.directResult = true;
                } else {
                  this.cdkCombined = data.data.code;
                  this.showCopyBtn = true;
                }
                this.cart = []; this.loadOrders();
                await this.syncCart();
              } else { this.checkoutError = data.error || '提交失败'; }
            } else {
              var self = this;
              var items = this.cart.map(function(ci) { return { item_id: ci.item.id, quantity: Number(ci.quantity), quality_level: Number(ci.quality) }; });
              var res = await fetchAPI('/api/shop/orders/batch', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ items: items, delivery_method: self.deliveryMethod })
              });
              var data = await res.json();
              if (data.success) {
                if (data.data.delivery_method === 'direct') {
                  this.directResult = true;
                } else {
                  this.cdkCombined = data.data.code;
                  this.showCopyBtn = true;
                }
                this.cart = []; this.loadOrders();
                await this.syncCart();
              } else { this.checkoutError = data.error || '提交失败'; }
            }
          } catch(e) { this.checkoutError = e.message || '提交失败'; }
          finally { this.submitting = false; }
        },

        copyCdkCode() {
          var code = this.cdkCombined;
          if (!code) return;
          navigator.clipboard.writeText(code).then(function() {
            this.showToast('提货码已复制', 'success');
          }.bind(this)).catch(function() {
            var ta = document.createElement('textarea');
            ta.value = code;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            this.showToast('提货码已复制', 'success');
          }.bind(this));
        },

        async deleteOrder(id) {
          var confirmed = await window.showConfirm({ title: '删除订单', content: '确定删除这个订单吗？', danger: true });
          if (!confirmed) return;
          try {
            var res = await fetchAPI('/api/shop/orders/' + id + '/delete', { method: 'POST' });
            var data = await res.json();
            this.showToast(data.success ? '订单已删除' : (data.error || '删除失败'), data.success ? 'success' : 'error');
            if (data.success) this.loadOrders();
          } catch(e) { this.showToast('网络错误', 'error'); }
        },

        toggleOrderSelect(orderId) {
          var idx = this.selectedOrderIds.indexOf(orderId);
          if (idx > -1) {
            this.selectedOrderIds.splice(idx, 1);
          } else {
            this.selectedOrderIds.push(orderId);
          }
        },

        toggleSelectAllOrders() {
          var all = this.orders;
          if (this.selectedOrderIds.length === all.length) {
            this.selectedOrderIds = [];
          } else {
            this.selectedOrderIds = all.map(function(o) { return o.order_id; });
          }
        },

        get allOrdersSelected() {
          return this.orders.length > 0 && this.selectedOrderIds.length === this.orders.length;
        },

        async deleteSelectedOrders() {
          if (this.selectedOrderIds.length === 0) {
            this.showToast('请先选择要删除的订单', 'warning');
            return;
          }
          var confirmed = await window.showConfirm({ title: '批量删除订单', content: '确定删除选中的 ' + this.selectedOrderIds.length + ' 个订单吗？', danger: true });
          if (!confirmed) return;
          try {
            var res = await fetchAPI('/api/shop/orders/delete-batch', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ ids: this.selectedOrderIds })
            });
            var data = await res.json();
            this.showToast(data.success ? data.message : (data.error || '删除失败'), data.success ? 'success' : 'error');
            if (data.success) {
              this.selectedOrderIds = [];
              this.loadOrders();
            }
          } catch(e) { this.showToast('网络错误', 'error'); }
        },

        openRequestModal() {
          this.requestItemId = '';
          this.requestQuantity = 1;
          this.requestQuality = 1;
          this.requestPlayerName = localStorage.getItem('shop_player_name') || '';
          this.requestError = '';
          this.showRequestModal = true;
        },

        async submitItemRequest() {
          if (!this.requestItemId) { this.requestError = '请选择要请求的物品'; return; }
          if (!this.requestPlayerName.trim()) { this.requestError = '请输入游戏角色名'; return; }
          this.requestSubmitting = true;
          this.requestError = '';

          try {
            var res = await fetchAPI('/api/shop/item-requests', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                item_id: parseInt(this.requestItemId),
                player_name: this.requestPlayerName.trim(),
                quantity: parseInt(this.requestQuantity) || 1,
                quality_level: parseInt(this.requestQuality) || 1,
              })
            });
            var data = await res.json();
            if (data.success) {
              this.showToast('物品请求已提交，请等待管理员审批', 'success');
              this.showRequestModal = false;
              if (this.requestPlayerName.trim()) {
                localStorage.setItem('shop_player_name', this.requestPlayerName.trim());
              }
            } else {
              this.requestError = data.error || '提交失败，请重试';
            }
          } catch (e) {
            this.requestError = '网络错误: ' + e.message;
          } finally {
            this.requestSubmitting = false;
          }
        },

        catLabel(c) {
          var map = { logistics:'物流', production:'生产', combat:'战斗', intermediate:'中间品', 'space-age':'太空时代', equipment:'装备', other:'其他' };
          return map[c] || c || '其他';
        },

        savePricePref() {
          localStorage.setItem('shop_show_price', this.showPrice ? 'true' : 'false');
        },

        orderStatusClass(s) {
          var map = { pending:'badge-info', processing:'badge-warning', delivered:'badge-success', cancelled:'badge-danger', failed:'badge-danger' };
          return map[s] || 'badge-info';
        },

        orderStatusText(s) {
          var map = { pending:'待处理', processing:'处理中', delivered:'已发货', cancelled:'已取消', failed:'失败' };
          return map[s] || s;
        },

        formatTs(ts) {
          if (!ts) return '-';
          return new Date(ts * 1000).toLocaleString('zh-CN');
        },

      };
    }
    </script>
</body>
</html>

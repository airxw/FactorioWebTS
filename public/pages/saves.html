<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="ws-port" content="34799">
    <title>存档管理 - FactorioWeb</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/bootstrap-icons.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar"></aside>
        <div class="main-content">
            <nav class="top-nav">
                <div class="top-nav-title">存档管理</div>
                <div class="top-nav-actions">
                    <button class="btn btn-sm btn-outline-secondary theme-toggle-btn" id="theme-toggle" data-tooltip="切换深色/浅色模式" data-tooltip-position="bottom" onclick="toggleTheme()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg></button>
                    <button class="mobile-menu-toggle" id="mobile-menu-toggle">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </button>
                    <button class="btn btn-sm btn-secondary" onclick="loadSavesData()"><i class="bi bi-arrow-clockwise me-1"></i>刷新</button>
                </div>
            </nav>
            <div class="page-content">
                <div class="page-title-row">
                    <div>
                        <h4>存档管理</h4>
                        <p class="page-title-sub">管理服务器存档文件，上传、切换、删除存档</p>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-success btn-sm" onclick="openGenerateSaveModal()"><i class="bi bi-plus-circle me-1"></i>生成存档</button>
                        <button class="btn btn-primary btn-sm" onclick="document.getElementById('save-file-input').click()"><i class="bi bi-upload me-1"></i>上传存档</button>
                    </div>
                    <input type="file" id="save-file-input" accept=".zip" class="file-input-hidden" onchange="uploadSave(this)">
                </div>
                <div class="saves-stats-row">
                    <div class="stat-card">
                        <div class="stat-card-icon orange"><i class="bi bi-file-earmark-zip"></i></div>
                        <div><div class="stat-card-label">存档总数</div><div class="stat-card-value" id="saves-total-count">--</div></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-icon green"><i class="bi bi-hdd"></i></div>
                        <div><div class="stat-card-label">总大小</div><div class="stat-card-value" id="saves-total-size">--</div></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-icon cyan"><i class="bi bi-star"></i></div>
                        <div><div class="stat-card-label">当前存档</div><div class="stat-card-value" id="saves-current-name" style="font-size:1.1rem;">--</div></div>
                    </div>
                </div>
                <div class="save-table-container">
                    <table class="table table-hover align-middle mb-0">
                        <thead><tr><th>文件名</th><th>显示名</th><th>大小</th><th>修改时间</th><th>状态</th><th class="text-end">操作</th></tr></thead>
                        <tbody id="saves-table-body"><tr><td colspan="6" class="text-center py-4 text-muted">加载中...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="generateSaveModal" class="modal-overlay">
        <div class="popup-panel">
            <div class="popup-title"><i class="bi bi-plus-circle me-2"></i>生成新存档</div>
            <div style="margin-bottom:20px;">
                <label>版本 <span style="color:var(--danger-color,#e74c3c);">*</span></label>
                <select class="form-select" id="generate-version"><option value="">-- 请选择版本 --</option></select>
            </div>
            <div style="margin-bottom:20px;">
                <label>存档名称</label>
                <input type="text" id="generate-savename" placeholder="留空自动生成">
                <div class="popup-hint">留空将根据当前时间自动生成名称</div>
            </div>
            <div style="margin-bottom:20px;">
                <label>地图种子</label>
                <div class="popup-seed-row">
                    <input type="text" id="generate-seed" placeholder="留空则随机生成">
                    <button onclick="generateRandomSeed()" class="popup-seed-btn">随机</button>
                </div>
                <div class="popup-hint">决定地图的随机生成基础值</div>
            </div>
            <div style="margin-bottom:20px;">
                <label>地图交换字符串</label>
                <input type="text" id="generate-map-exchange" placeholder="地图交换字符串（可选）">
                <div class="popup-hint">用于复制他人的地图设置</div>
            </div>
            <div class="popup-actions">
                <button onclick="closeGenerateSaveModal()" class="popup-cancel-btn">取消</button>
                <button onclick="doGenerateSave()" class="btn btn-success fw-bold" style="padding:8px 24px;" id="btn-generate-save"><i class="bi bi-check-lg me-1"></i>生成存档</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="/js/token-manager.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/shared.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/modal.js"></script>
    <script src="/js/sidebar-menu.js"></script>
    <script src="/js/tooltip.js"></script>
    <script src="/js/app.js"></script>
    <script>
        async function loadSavesData() {
            const tbody = document.getElementById('saves-table-body');
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">正在加载存档列表...</td></tr>';
            try {
                const res = await fetchAPI('/api/files/saves');
                const d = await res.json();
                if (d.success) {
                    renderSaveList(d.data || []);
                } else {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4" style="color:#e74c3c;">加载失败</td></tr>';
                }
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4" style="color:#e74c3c;">网络错误: ' + escapeHtml(e.message) + '</td></tr>';
            }
        }

        function renderSaveList(data) {
            const tbody = document.getElementById('saves-table-body');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted"><i class="bi bi-inbox d-block mb-2" style="font-size:1.8rem;opacity:0.3;"></i>暂无存档文件</td></tr>';
                document.getElementById('saves-total-count').textContent = '0';
                document.getElementById('saves-total-size').textContent = '0 MB';
                document.getElementById('saves-current-name').textContent = '--';
                return;
            }
            const totalSize = data.reduce(function(sum, f) { return sum + (f.size_mb || 0); }, 0);
            const currentFile = data.find(function(f) { return f.is_current; });
            document.getElementById('saves-total-count').textContent = data.length;
            document.getElementById('saves-total-size').textContent = totalSize.toFixed(2) + ' MB';
            document.getElementById('saves-current-name').textContent = currentFile ? currentFile.filename : '--';
            tbody.innerHTML = data.map(function(f) {
                var enc = encodeURIComponent(f.filename);
                return '<tr>' +
                    '<td><span class="save-filename">' + escapeHtml(f.filename) + '</span></td>' +
                    '<td>' + escapeHtml(f.display || f.filename) + '</td>' +
                    '<td>' + (f.size_mb || 0).toFixed(2) + ' MB</td>' +
                    '<td style="white-space:nowrap;">' + escapeHtml(f.time || '--') + '</td>' +
                    '<td>' + (f.is_current ? '<span class="badge-current-save"><i class="bi bi-star-fill me-1"></i>当前</span>' : '<span class="text-muted" style="font-size:0.78rem;">--</span>') + '</td>' +
                    '<td class="text-end"><div class="d-flex gap-1 justify-content-end">' +
                        (!f.is_current ? '<button class="btn btn-outline-primary btn-sm" onclick="setCurrentSave(\'' + enc + '\')" title="设为当前存档"><i class="bi bi-check-lg"></i></button>' : '') +
                        '<button class="btn btn-outline-secondary btn-sm" onclick="downloadSave(\'' + enc + '\')" title="下载"><i class="bi bi-download"></i></button>' +
                        '<button class="btn btn-outline-danger btn-sm" onclick="deleteSave(\'' + enc + '\')" title="删除"><i class="bi bi-trash3"></i></button>' +
                    '</div></td></tr>';
            }).join('');
        }

        async function setCurrentSave(rawFilename) {
            var filename = decodeURIComponent(rawFilename);
            showModal({ title: '确认切换存档', content: '确定要将 "' + filename + '" 设为当前存档吗？服务器重启后将使用此存档。', confirmText: '确认', onConfirm: async function() {
                try {
                    const res = await fetchAPI('/api/files/set-current', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ filename: filename })
                    });
                    const d = await res.json();
                    if (d.success) { showToast('已将 ' + filename + ' 设为当前存档', 'success'); loadSavesData(); }
                    else { showToast(d.error || '设置失败', 'error'); }
                } catch (e) { showToast('操作失败: ' + e.message, 'error'); }
            }});
        }

        function downloadSave(rawFilename) {
            var filename = decodeURIComponent(rawFilename);
            fetchAPI('/api/files/download/' + encodeURIComponent(filename))
                .then(function(res) {
                    if (!res.ok) throw new Error('下载失败');
                    return res.blob();
                })
                .then(function(blob) {
                    var url = URL.createObjectURL(blob);
                    var a = document.createElement('a');
                    a.href = url;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                })
                .catch(function(e) {
                    showToast('下载失败: ' + e.message, 'error');
                });
        }

        function uploadSave(input) {
            if (!input.files || !input.files[0]) return;
            var file = input.files[0];
            showToast('正在上传存档: ' + file.name + '...', 'info');

            var reader = new FileReader();
            reader.onload = function(e) {
                var base64Content = e.target.result.split(',')[1];
                fetchAPI('/api/files/upload', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filename: file.name, content: base64Content })
                })
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    if (d.success) { showToast('存档上传成功', 'success'); loadSavesData(); }
                    else { showToast(d.error || '上传失败', 'error'); }
                })
                .catch(function(e) { showToast('上传失败: ' + e.message, 'error'); });
            };
            reader.onerror = function() {
                showToast('读取文件失败', 'error');
            };
            reader.readAsDataURL(file);
            input.value = '';
        }

        function deleteSave(rawFilename) {
            var filename = decodeURIComponent(rawFilename);
            showModal({ title: '确认删除存档', content: '确定要删除存档 "' + filename + '" 吗？此操作不可恢复！', confirmText: '确认', danger: true, onConfirm: async function() {
                try {
                    const res = await fetchAPI('/api/files/' + encodeURIComponent(filename), { method: 'DELETE' });
                    const d = await res.json();
                    if (d.success) { showToast('存档已删除', 'success'); loadSavesData(); }
                    else { showToast(d.error || '删除失败', 'error'); }
                } catch (e) { showToast('删除失败: ' + e.message, 'error'); }
            }});
        }

        async function openGenerateSaveModal() {
            document.getElementById('generate-savename').value = '';
            document.getElementById('generate-seed').value = '';
            document.getElementById('generate-map-exchange').value = '';
            var versionSelect = document.getElementById('generate-version');
            if (versionSelect.options.length <= 1) {
                try {
                    const res = await fetchAPI('/api/versions');
                    const d = await res.json();
                    if (d.success && d.data) {
                        versionSelect.innerHTML = '<option value="">-- 请选择版本 --</option>';
                        d.data.forEach(function(v) {
                            versionSelect.innerHTML += '<option value="' + escapeHtml(v.version) + '">' + escapeHtml(v.label || v.version) + '</option>';
                        });
                    }
                } catch (e) { showToast('加载版本列表失败', 'error'); }
            }
            versionSelect.value = '';

            var modal = document.getElementById('generateSaveModal');
            modal.classList.add('show');

            var ref = { closeModal: closeGenerateSaveModal, overlay: modal };
            pushModal(ref);
            trapFocus(modal.querySelector('.popup-panel'));

            if (!modal._clickOutBound) {
                modal._clickOutBound = true;
                modal.addEventListener('click', function(e) {
                    if (e.target === modal) closeGenerateSaveModal();
                });
            }
        }

        function generateRandomSeed() {
            document.getElementById('generate-seed').value = Math.floor(Math.random() * 2147483647);
        }

        async function doGenerateSave() {
            var version = document.getElementById('generate-version').value;
            var saveName = document.getElementById('generate-savename').value.trim();
            var seed = document.getElementById('generate-seed').value.trim();
            var mapExchange = document.getElementById('generate-map-exchange').value.trim();
            if (!version) { showToast('请选择版本', 'warning'); return; }

            if (saveName && !/^[a-zA-Z0-9_\-\u4e00-\u9fff]+$/.test(saveName)) {
                showToast('地图名称只能包含字母、数字、下划线、短横线或中文', 'warning');
                return;
            }

            if (seed && !/^-?\d{1,20}$/.test(seed)) {
                showToast('种子必须是有效的整数（如 123456789）', 'warning');
                return;
            }

            var btn = document.getElementById('btn-generate-save');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>生成中...';
            try {
                var bodyData = { version: version };
                if (saveName) bodyData.save_name = saveName;
                if (seed) bodyData.seed = seed;
                if (mapExchange) bodyData.map_exchange_string = mapExchange;

                const res = await fetchAPI('/api/files/create-save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });
                const d = await res.json();
                if (d.success) {
                    var resultFilename = d.data ? d.data.filename : d.filename;
                    var resultSize = d.data ? d.data.size : d.size;
                    showToast('存档 "' + resultFilename + '" 生成成功！大小：' + resultSize, 'success');
                    closeGenerateSaveModal();
                    loadSavesData();
                } else { showToast(d.error || '生成失败', 'error'); }
            } catch (e) { showToast('生成失败: ' + e.message, 'error'); }
            finally { btn.disabled = false; btn.innerHTML = '<i class="bi bi-check-lg me-1"></i>生成存档'; }
        }

        function closeGenerateSaveModal() {
            var modal = document.getElementById('generateSaveModal');
            modal.classList.remove('show');
            popModal({ closeModal: closeGenerateSaveModal, overlay: modal });
        }

        document.addEventListener('DOMContentLoaded', function() {
            checkSession({ 
                requireAuth: true,
                onValid: function(userData) {
                    if (userData.role !== 'admin') {
                        showToast('权限不足，只有管理员才能访问此页面', 'error');
                        setTimeout(function() {
                            window.location.href = 'profile.html';
                        }, 1500);
                        return;
                    }
                    SidebarMenu.initSidebarWithPermission();
                    loadSavesData();
                }
            });
        });
    </script>
</body>
</html>

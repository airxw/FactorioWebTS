<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FactorioWeb - RCON控制台</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/bootstrap-icons.css">
    <script src="/js/htmx.min.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/alpine.min.js" defer></script>
</head>
<body x-data="createPageApp(consoleApp())" x-init="init()">
    <div class="app-container">
        <aside class="sidebar" id="sidebar"></aside>

        <div class="main-content">
            <nav class="top-nav">
                <div class="top-nav-title">RCON控制台</div>
                <div class="top-nav-actions">
                    <button class="btn btn-sm btn-outline-secondary theme-toggle-btn" @click="ThemeManager.toggle()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    </button>
                    <button class="mobile-menu-toggle" id="mobile-menu-toggle">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </button>
                    <button class="btn btn-sm btn-secondary" @click="refreshStatus()">刷新状态</button>
                    <button class="btn btn-sm btn-danger" @click="logout()">退出登录</button>
                </div>
            </nav>

            <div class="page-content">
                <div class="card mb-4">
                    <div class="card-header"><h3 class="card-title">RCON状态</h3></div>
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div :class="'status-indicator ' + statusClass" x-html="'服务器: ' + serverStatus"></div>
                            <div x-text="'版本: ' + (serverVersion || '未知') + ' | 在线: ' + (playerCount || '?')"></div>
                        </div>
                    </div>
                </div>

                <div class="card mb-4">
                    <div class="card-header"><h3 class="card-title">执行命令</h3></div>
                    <div class="card-body">
                        <div class="form-row-flex">
                            <div class="form-group flex-1" style="position:relative;">
                                <input type="text" id="command-input" x-ref="cmdInput" x-model="cmdInput" class="form-control" placeholder="请输入RCON命令" autocomplete="off"
                                       style="font-family:'Courier New',Courier,monospace;"
                                       @keydown.enter="executeCommand(cmdInput.trim())"
                                       @keydown.arrow-up.prevent="navigateHistory(-1,$el)"
                                       @keydown.arrow-down.prevent="navigateHistory(1,$el)"
                                       @keydown.escape="hideHistoryDropdown()"
                                       @input="historyIdx = -1; showHistoryDropdown($el.value)"
                                       @focus="showHistoryDropdown($el.value)">
                                <div id="command-history-dropdown" class="command-history-dropdown"
                                     x-show="historyVisible" @click.outside="hideHistoryDropdown()"
                                     x-transition>
                                    <template x-for="(cmd,i) in filteredHistory" :key="i">
                                        <div class="command-history-item"
                                             :class="{ active: i === historyIdx }"
                                             @mousedown.prevent="$refs.cmdInput.value = cmd; cmdInput = cmd; hideHistoryDropdown()"
                                             x-text="cmd"></div>
                                    </template>
                                </div>
                            </div>
                            <div class="form-group" style="min-width:120px;">
                                <button class="btn btn-primary w-100" @click="executeCommand($refs.cmdInput.value.trim())">执行</button>
                            </div>
                        </div>
                        <div class="mt-3">
                            <h4 class="mb-2">常用命令</h4>
                            <div class="d-flex flex-wrap gap-2">
                                <button class="btn btn-sm btn-secondary" @click="insertCommand('/help')">/help</button>
                                <button class="btn btn-sm btn-secondary" @click="insertCommand('/players')">/players</button>
                                <button class="btn btn-sm btn-secondary" @click="insertCommand('/ban')">/ban</button>
                                <button class="btn btn-sm btn-secondary" @click="insertCommand('/unban')">/unban</button>
                                <button class="btn btn-sm btn-secondary" @click="insertCommand('/kick')">/kick</button>
                                <button class="btn btn-sm btn-secondary" @click="insertCommand('/save')">/save</button>
                                <button class="btn btn-sm btn-secondary" @click="insertCommand('/evolution')">/evolution</button>
                                <button class="btn btn-sm btn-secondary" @click="insertCommand('/time')">/time</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card mb-4">
                    <div class="card-header"><h3 class="card-title">命令输出</h3></div>
                    <div class="card-body">
                        <div id="command-output" class="log-container" style="height:400px;" x-html="renderedOutput"></div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header"><h3 class="card-title">命令历史</h3></div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table">
                                <thead><tr><th>时间</th><th>命令</th><th>结果</th><th>操作</th></tr></thead>
                                <tbody>
                                    <tr x-show="cmdHistory.length === 0"><td colspan="4" class="text-center">暂无命令历史</td></tr>
                                    <template x-for="(h,i) in cmdHistory" :key="i">
                                        <tr>
                                            <td x-text="h.time"></td>
                                            <td><code x-text="h.command"></code></td>
                                            <td x-text="h.result.substring(0, 100)" :title="h.result"></td>
                                            <td><button class="btn btn-sm btn-secondary" @click="insertCommand(h.command)">重用</button></td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="/js/token-manager.js"></script>
    <script src="/js/websocket.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/shared.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/sidebar-menu.js"></script>
    <script>
    function consoleApp() {
      return {
        serverStatus: '加载中...',
        serverVersion: '',
        playerCount: '?',
        statusClass: 'status-loading',
        cmdInput: '',
        outputLog: [],
        cmdHistory: [],
        historyVisible: false,
        historyIdx: -1,
        pollTimer: null,
        wsReady: false,

        init() {
          SidebarMenu.initSidebarWithPermission();
          var token = TokenManager.getToken();
          var userInfo = TokenManager.getUserInfo();
          if (!token) { window.location.href = 'login.html'; return; }
          if (userInfo && userInfo.role !== 'admin') { this.showToast('权限不足', 'error'); setTimeout(() => window.location.href = 'dashboard.html', 1500); return; }
          this.refreshStatus();
          this.pollTimer = setInterval(() => this.refreshStatus(), 10000);
          var self = this;
          window.addEventListener('beforeunload', function() {
            if (self.pollTimer) clearInterval(self.pollTimer);
          });
          this.initWebSocket();
        },

        initWebSocket() {
          var self = this;
          wsClient.on('open', function() {
            self.wsReady = true;
          });
          wsClient.subscribe('console_response', function(data) {
            if (data && data.lines && data.lines.length > 0) {
              var prefix = data.command ? '[' + self.now() + '] [async] ' : '[' + self.now() + '] ';
              for (var i = 0; i < data.lines.length; i++) {
                self.addOutput(prefix + data.lines[i]);
              }
            }
          });
          wsClient.connect();
        },

        async refreshStatus() {
          this.statusClass = 'status-loading';
          try {
            var res = await fetchAPI('/api/server/status');
            var data = await res.json();
            if (data.success && data.data) {
              var d = data.data;
              var state = d.state || 'unknown';
              if (state === 'starting') {
                this.statusClass = 'status-loading'; this.serverStatus = '启动中...';
              } else if (state === 'running' || d.running === true) {
                this.statusClass = 'status-online'; this.serverStatus = '在线';
                this.serverVersion = d.version || '?'; this.playerCount = d.playerCount ?? '?';
                localStorage.setItem('server_running', 'true');
                if (typeof SidebarMenu !== 'undefined' && SidebarMenu.refresh) {
                  SidebarMenu.refresh();
                }
              } else if (state === 'stopping') {
                this.statusClass = 'status-loading'; this.serverStatus = '停止中...';
              } else if (state === 'error') {
                this.statusClass = 'status-offline'; this.serverStatus = '异常';
              } else {
                this.statusClass = 'status-offline'; this.serverStatus = '离线 - <a href="server-control.html" style="color:#f0a030;text-decoration:underline;">请先启动服务器</a>';
                localStorage.setItem('server_running', 'false');
                if (typeof SidebarMenu !== 'undefined' && SidebarMenu.refresh) {
                  SidebarMenu.refresh();
                }
              }
            }
          } catch(e) { this.statusClass = 'status-offline'; this.serverStatus = '连接失败'; }
        },

        async executeCommand(cmd) {
          if (!cmd) return;
          this.addOutput('[' + this.now() + '] > ' + cmd);
          this.cmdInput = '';
          this.historyIdx = -1;
          this.saveToLocalHistory(cmd);

          try {
            var res = await fetchAPI('/api/server/console', {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ command: cmd })
            });
            var data = await res.json();
            var response = data.success ? (data.data?.response || '(无返回)') : (data.error || '未知错误');
            this.addOutput('[' + this.now() + '] ' + response);
            this.cmdHistory.unshift({ time: this.now(), command: cmd, result: response });
            if (this.cmdHistory.length > 20) this.cmdHistory.pop();
          } catch(e) {
            var msg = '网络错误: ' + e.message;
            this.addOutput('[' + this.now() + '] ' + msg);
            this.cmdHistory.unshift({ time: this.now(), command: cmd, result: msg });
            if (this.cmdHistory.length > 20) this.cmdHistory.pop();
          }
        },

        insertCommand(cmd) {
          this.cmdInput = cmd;
          this.$nextTick(function() {
            var el = document.getElementById('command-input');
            if (el) el.focus();
          });
        },

        addOutput(text) {
          if (this.outputLog.length > 200) this.outputLog.shift();
          this.outputLog.push(text);
          this.$nextTick(function() {
            var el = document.getElementById('command-output');
            if (el) el.scrollTop = el.scrollHeight;
          });
        },

        get renderedOutput() {
          return this.outputLog.map(function(t) { return escapeHtml(t); }).join('<br>');
        },

        get filteredHistory() {
          var val = (this.cmdInput || '').toLowerCase();
          var hist = this.getLocalHistory();
          if (!val) return hist;
          return hist.filter(function(c) { return c.toLowerCase().indexOf(val) !== -1; });
        },

        showHistoryDropdown(val) {
          var hist = this.getLocalHistory();
          if (hist.length === 0) { this.historyVisible = false; return; }
          this.historyVisible = true;
        },

        hideHistoryDropdown() { this.historyVisible = false; this.historyIdx = -1; },

        navigateHistory(dir) {
          var hist = this.getLocalHistory();
          if (hist.length === 0) return;
          if (!this.historyVisible) { this.historyVisible = true; this.historyIdx = -1; }
          var newIdx = this.historyIdx + dir;
          if (newIdx < 0) newIdx = 0;
          if (newIdx >= hist.length) {
            this.historyIdx = hist.length;
            this.cmdInput = '';
            return;
          }
          this.historyIdx = newIdx;
          this.cmdInput = hist[newIdx];
        },

        getLocalHistory() {
          try { return JSON.parse(localStorage.getItem('rcon_cmd_history') || '[]'); } catch { return []; }
        },

        saveToLocalHistory(cmd) {
          var hist = this.getLocalHistory();
          var idx = hist.indexOf(cmd);
          if (idx !== -1) hist.splice(idx, 1);
          hist.unshift(cmd);
          if (hist.length > 20) hist = hist.slice(0, 20);
          localStorage.setItem('rcon_cmd_history', JSON.stringify(hist));
        },

        now() { return new Date().toLocaleTimeString('zh-CN'); },

      };
    }
    </script>
</body>
</html>
